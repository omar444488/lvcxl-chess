<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lvcxl. | Chess Atelier</title>
  <style>
    :root {
      --bg: #060c14;
      --bg-deep: #03070e;
      --bg-mid: #0b1420;
      --panel: rgba(11, 18, 29, 0.84);
      --panel-strong: rgba(10, 17, 28, 0.96);
      --panel-soft: rgba(20, 32, 49, 0.72);
      --panel-sheen: rgba(255, 255, 255, 0.04);
      --ink: #edf3ff;
      --muted: #9aaac3;
      --accent: #f1b362;
      --accent-strong: #ff8a45;
      --accent-soft: rgba(241, 179, 98, 0.14);
      --accent-cool: #90b8ff;
      --light-square: #9caec5;
      --dark-square: #25354d;
      --light-piece: #f8fbff;
      --dark-piece: #101724;
      --border: rgba(151, 174, 210, 0.18);
      --border-strong: rgba(241, 179, 98, 0.28);
      --shadow: 0 30px 90px rgba(0, 0, 0, 0.46);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #07101a 0%, #040912 100%);
    }

    body::before,
    body::after {
      display: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px;
    }

    .site-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      padding: 14px 18px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background:
        linear-gradient(180deg, rgba(12, 20, 31, 0.92) 0%, rgba(8, 13, 21, 0.9) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 18px 44px rgba(0, 0, 0, 0.24);
      animation: riseFade 720ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-emblem {
      position: relative;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(241, 179, 98, 0.18);
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.14), transparent 26%),
        linear-gradient(160deg, rgba(35, 24, 12, 0.92) 0%, rgba(17, 25, 38, 0.94) 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.04),
        0 10px 26px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .brand-emblem span {
      position: absolute;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow: 0 0 18px rgba(255, 143, 69, 0.32);
    }

    .brand-emblem span:nth-child(1) {
      width: 20px;
      height: 2px;
      top: 13px;
      left: 12px;
      transform: rotate(48deg);
    }

    .brand-emblem span:nth-child(2) {
      width: 22px;
      height: 2px;
      top: 20px;
      left: 11px;
      transform: rotate(-48deg);
    }

    .brand-emblem span:nth-child(3) {
      width: 6px;
      height: 6px;
      right: 10px;
      bottom: 9px;
    }

    .brand-lockup-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .brand-lockup-copy strong {
      font-family: "Cormorant Garamond", "Didot", serif;
      font-size: 1.7rem;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      color: #fff4df;
    }

    .brand-lockup-copy span {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .site-status {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #d6e2f5;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow: 0 0 14px rgba(255, 143, 69, 0.5);
    }

    .hero {
      margin-bottom: 28px;
    }

    .hero-shell {
      position: relative;
      padding: 30px;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background:
        linear-gradient(180deg, rgba(12, 19, 30, 0.94) 0%, rgba(7, 12, 20, 0.94) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 26px 70px rgba(0, 0, 0, 0.34);
      overflow: hidden;
    }

    .hero-shell::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 33px;
      border: 1px solid rgba(241, 179, 98, 0.08);
      pointer-events: none;
    }

    .hero-shell::after {
      content: "";
      position: absolute;
      inset: auto -14% 8% auto;
      width: 320px;
      height: 320px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255, 158, 82, 0.16) 0%, rgba(255, 158, 82, 0) 68%);
      filter: blur(6px);
      pointer-events: none;
    }

    .hero-grid {
      display: grid;
      gap: 36px;
      align-items: center;
    }

    @media (min-width: 1040px) {
      .hero-grid {
        grid-template-columns: minmax(0, 1.08fr) minmax(300px, 0.92fr);
      }
    }

    .hero-copy {
      display: grid;
      gap: 16px;
    }

    .signal-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .eyebrow {
      width: fit-content;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ffddaa;
      font-weight: 700;
      border: 1px solid rgba(243, 179, 95, 0.2);
      background:
        linear-gradient(180deg, rgba(243, 179, 95, 0.12) 0%, rgba(243, 179, 95, 0.06) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .hero-copy > * {
      animation: riseFade 760ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .hero-copy > *:nth-child(1) { animation-delay: 0.02s; }
    .hero-copy > *:nth-child(2) { animation-delay: 0.08s; }
    .hero-copy > *:nth-child(3) { animation-delay: 0.14s; }
    .hero-copy > *:nth-child(4) { animation-delay: 0.2s; }

    .signal {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: 999px;
      font-size: 0.82rem;
      color: #d8e4fb;
      background:
        linear-gradient(180deg, rgba(16, 25, 38, 0.86) 0%, rgba(11, 19, 30, 0.78) 100%);
      border: 1px solid rgba(151, 174, 210, 0.14);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .signal::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow: 0 0 16px rgba(255, 143, 69, 0.52);
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", "Didot", "Bodoni 72", serif;
      font-size: clamp(2.6rem, 4.8vw, 4.6rem);
      font-weight: 600;
      line-height: 0.98;
      letter-spacing: 0.01em;
      max-width: 820px;
      text-wrap: balance;
      color: #fff7eb;
      text-shadow: 0 10px 32px rgba(0, 0, 0, 0.28);
    }

    .hero p {
      margin: 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 8px;
    }

    .hero-stat {
      position: relative;
      padding: 16px 16px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(15, 24, 37, 0.82) 0%, rgba(10, 16, 26, 0.76) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .hero-stat::after {
      content: "";
      position: absolute;
      inset: auto auto -48px -30px;
      width: 110px;
      height: 110px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255, 164, 92, 0.16) 0%, rgba(255, 164, 92, 0) 72%);
      pointer-events: none;
    }

    .hero-stat strong {
      display: block;
      margin-bottom: 8px;
      font-family: "Cormorant Garamond", "Didot", serif;
      font-size: 1.28rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #fff2d8;
    }

    .hero-stat span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.55;
    }

    .brand-stage {
      position: relative;
      display: grid;
      gap: 16px;
    }

    .brand-orbit {
      position: absolute;
      inset: -24px;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      background:
        radial-gradient(circle at center, rgba(255, 168, 95, 0.1) 0%, rgba(255, 168, 95, 0) 62%);
      filter: blur(0.2px);
      pointer-events: none;
    }

    .brand-orbit::before,
    .brand-orbit::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(241, 179, 98, 0.12);
    }

    .brand-orbit::before {
      inset: 10% -4%;
    }

    .brand-orbit::after {
      inset: -4% 12%;
    }

    .logo-card {
      position: relative;
      overflow: hidden;
      padding: 20px;
      border-radius: 30px;
      background:
        linear-gradient(160deg, rgba(18, 28, 42, 0.98) 0%, rgba(8, 13, 21, 0.98) 100%);
      border: 1px solid rgba(243, 179, 95, 0.18);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 28px 70px rgba(0, 0, 0, 0.4);
    }

    .logo-card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 24px;
      border: 1px solid rgba(243, 179, 95, 0.16);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.06), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
      pointer-events: none;
    }

    .logo-card::after {
      display: none;
    }

    .logo-svg {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.34));
    }

    .logo-plaque {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 6px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      text-align: center;
    }

    .logo-wordmark {
      font-family: "Cormorant Garamond", "Didot", serif;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: #fff0d3;
    }

    .logo-subline {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .logo-caption {
      margin: 0 10px;
      color: #cfdaf0;
      font-family: "Cormorant Garamond", "Baskerville", serif;
      font-size: 1.1rem;
      line-height: 1.5;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .layout {
      display: grid;
      gap: 18px;
      align-items: start;
    }

    @media (min-width: 1040px) {
      .layout {
        grid-template-columns: minmax(0, 680px) minmax(280px, 360px);
      }
    }

    .panel {
      position: relative;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-strong) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .panel::before {
      display: none;
    }

    .board-panel {
      padding: 14px;
    }

    .board-stage {
      position: relative;
      padding: 10px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(8, 13, 22, 0.96);
      overflow: hidden;
    }

    .board-stage::before {
      display: none;
    }

    .board-wrap {
      width: min(100%, 630px);
      margin: 0 auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 22px 56px rgba(0, 0, 0, 0.4);
    }

    .square {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      border: 0;
      padding: 4px;
      cursor: pointer;
      font-size: clamp(2rem, 5.8vw, 3rem);
      line-height: 1;
      transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .square::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.045) 0%, rgba(255, 255, 255, 0) 36%);
      pointer-events: none;
    }

    .square:hover {
      transform: scale(0.985);
      filter: brightness(1.08) saturate(1.03);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .square.light {
      background:
        radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.08), transparent 30%),
        linear-gradient(180deg, #92a4bc 0%, var(--light-square) 100%);
    }

    .square.dark {
      background:
        radial-gradient(circle at 72% 74%, rgba(255, 255, 255, 0.04), transparent 32%),
        linear-gradient(180deg, #304460 0%, var(--dark-square) 100%);
    }

    .piece-host {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .piece-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .piece-char {
      font-size: 3rem;
      line-height: 1;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.22);
    }

    .piece-svg {
      width: 82%;
      height: 82%;
      overflow: visible;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.22));
      transition: transform 140ms ease, filter 140ms ease;
    }

    .square:hover .piece-svg,
    .piece-btn:hover .piece-svg {
      transform: translateY(-1px) scale(1.02);
    }

    .piece-svg .piece-solid {
      fill: currentColor;
      stroke: var(--piece-line);
      stroke-width: 2.8;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .piece-svg .piece-highlight {
      fill: var(--piece-glow);
    }

    .piece-svg .piece-shade {
      fill: var(--piece-shade);
    }

    .piece-svg .piece-cut {
      fill: var(--piece-cut);
    }

    .piece-svg .piece-cut-line {
      fill: none;
      stroke: var(--piece-cut);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .square.white-piece {
      color: var(--light-piece);
      --piece-line: rgba(19, 27, 38, 0.34);
      --piece-glow: rgba(255, 255, 255, 0.38);
      --piece-shade: rgba(76, 98, 128, 0.16);
      --piece-cut: rgba(26, 39, 56, 0.22);
    }

    .square.black-piece {
      color: #0f1724;
      --piece-line: rgba(255, 255, 255, 0.12);
      --piece-glow: rgba(255, 255, 255, 0.07);
      --piece-shade: rgba(255, 255, 255, 0.06);
      --piece-cut: rgba(255, 255, 255, 0.16);
    }

    .square.selected-square::after,
    .square.last-move::after {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 14px;
      pointer-events: none;
    }

    .square.selected-square::after {
      border: 3px solid rgba(243, 179, 95, 0.95);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        0 0 18px rgba(243, 179, 95, 0.28);
    }

    .square.last-move::after {
      background: rgba(255, 184, 91, 0.16);
      border: 2px solid rgba(255, 184, 91, 0.34);
    }

    .coord {
      position: absolute;
      left: 8px;
      bottom: 6px;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      opacity: 0.66;
      background: rgba(9, 16, 25, 0.16);
      pointer-events: none;
    }

    .controls {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .section {
      display: grid;
      gap: 10px;
    }

    .section h2 {
      margin: 0;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #c9d6ee;
    }

    .mode-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .piece-btn,
    .action-btn,
    select,
    input {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(15, 24, 37, 0.9);
      color: var(--ink);
    }

    .piece-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      font-size: 1.8rem;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .piece-btn .piece-svg {
      width: 62%;
      height: 62%;
    }

    .piece-btn .piece-char {
      font-size: 2.2rem;
    }

    .piece-btn.piece-btn-white {
      color: var(--light-piece);
      --piece-line: rgba(19, 27, 38, 0.34);
      --piece-glow: rgba(255, 255, 255, 0.38);
      --piece-shade: rgba(76, 98, 128, 0.16);
      --piece-cut: rgba(26, 39, 56, 0.22);
    }

    .piece-btn.piece-btn-black {
      color: #0f1724;
      --piece-line: rgba(255, 255, 255, 0.12);
      --piece-glow: rgba(255, 255, 255, 0.07);
      --piece-shade: rgba(255, 255, 255, 0.06);
      --piece-cut: rgba(255, 255, 255, 0.16);
    }

    .piece-clear {
      font-size: 1.5rem;
      font-weight: 700;
      opacity: 0.72;
      pointer-events: none;
    }

    .piece-btn:hover,
    .action-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(243, 179, 95, 0.42);
    }

    .piece-btn.selected {
      border-color: var(--accent);
      background: linear-gradient(180deg, rgba(243, 179, 95, 0.22) 0%, rgba(243, 179, 95, 0.1) 100%);
      box-shadow: inset 0 0 0 1px rgba(243, 179, 95, 0.22);
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .history-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .action-btn {
      min-height: 46px;
      padding: 0 14px;
      font-family: "Manrope", "Avenir Next", sans-serif;
      letter-spacing: 0.04em;
      font-weight: 700;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, #e1a85f 0%, #ff7a42 54%, #ff5a42 100%);
      color: #10141b;
      border: 0;
      box-shadow: 0 16px 36px rgba(255, 106, 61, 0.26);
    }

    .action-btn.selected {
      border-color: var(--accent);
      background: linear-gradient(180deg, rgba(243, 179, 95, 0.18) 0%, rgba(243, 179, 95, 0.08) 100%);
      box-shadow: inset 0 0 0 1px rgba(243, 179, 95, 0.18);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      border-color: var(--border);
      box-shadow: none;
    }

    .history-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .history-icon {
      font-size: 1.1rem;
      line-height: 1;
    }

    .field-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label,
    details summary {
      font-size: 0.88rem;
      font-weight: 700;
      color: #c6d4eb;
    }

    select,
    input {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      font: inherit;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    details {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: rgba(15, 25, 39, 0.78);
    }

    details[open] {
      background: rgba(16, 27, 42, 0.96);
    }

    details summary {
      cursor: pointer;
      list-style: none;
    }

    details summary::-webkit-details-marker {
      display: none;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .checks label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .result {
      min-height: 90px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border-strong);
      background:
        radial-gradient(circle at top right, rgba(255, 143, 69, 0.16), transparent 32%),
        linear-gradient(180deg, rgba(20, 33, 48, 0.98) 0%, rgba(13, 21, 33, 0.96) 100%);
      display: grid;
      gap: 4px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .result strong {
      font-family: "Cormorant Garamond", "Didot", serif;
      font-size: 2.2rem;
      line-height: 1;
      letter-spacing: 0.04em;
      color: #fff0d2;
    }

    .result span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .source-card {
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(8, 14, 22, 0.92);
    }

    .source-card-title {
      margin: 0 0 10px;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .source-table {
      width: 100%;
      border-collapse: collapse;
      color: #dce7fa;
    }

    .source-table th,
    .source-table td {
      padding: 8px 0;
      border-top: 1px solid rgba(122, 154, 193, 0.12);
    }

    .source-table tr:first-child th,
    .source-table tr:first-child td {
      border-top: 0;
    }

    .source-table th {
      text-align: left;
      font-size: 0.92rem;
      font-weight: 600;
      color: #d8e4f8;
    }

    .source-table td {
      text-align: right;
      font-family: "Courier New", monospace;
      font-size: 1rem;
      color: #fff0d2;
    }

    .fen-box {
      min-height: 88px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(8, 14, 22, 0.92);
      font-family: "Courier New", monospace;
      font-size: 0.9rem;
      line-height: 1.45;
      word-break: break-all;
      color: #dce7fa;
    }

    .hint {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .status-box,
    .history-hint,
    .panel-head,
    .analysis-note,
    .hero,
    .site-bar {
      display: none;
    }

    @keyframes riseFade {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 12px;
      }

      .controls,
      .board-panel {
        padding: 12px;
      }

      .board-stage {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="layout">
      <section class="panel board-panel">
        <div class="board-stage">
          <div class="board-wrap">
            <div id="board" class="board" aria-label="Chess board"></div>
          </div>
        </div>
      </section>

      <aside class="panel controls">
        <section class="section">
          <div class="mode-row">
            <button id="moveModeBtn" class="action-btn selected">Move pieces</button>
            <button id="editModeBtn" class="action-btn">Edit pieces</button>
          </div>
          <div class="action-row">
            <button id="startBtn" class="action-btn">Start position</button>
            <button id="clearBtn" class="action-btn">Clear board</button>
            <button id="flipBtn" class="action-btn" type="button">Flip board</button>
          </div>
          <div class="history-row">
            <button id="undoBtn" class="action-btn history-btn" type="button">
              <span class="history-icon">↶</span>
              <span>Undo</span>
            </button>
            <button id="redoBtn" class="action-btn history-btn" type="button">
              <span class="history-icon">↷</span>
              <span>Redo</span>
            </button>
          </div>
        </section>

        <details id="editTools">
          <summary>Edit palette</summary>
          <div id="palette" class="palette" style="margin-top: 12px;"></div>
        </details>

        <section class="section">
          <div class="field">
            <label for="turn">Side to move</label>
            <select id="turn">
              <option value="w">White</option>
              <option value="b">Black</option>
            </select>
          </div>
          <label class="hint" style="display: flex; align-items: center; gap: 8px;">
            <input id="autoTurn" type="checkbox" checked>
            Auto-switch turn after each manual move
          </label>
        </section>

        <section class="section">
          <button id="analyzeBtn" class="action-btn primary">Best move</button>
          <div id="result" class="result">
            <strong>--</strong>
          </div>
        </section>

        <section class="section">
          <div class="source-card">
            <p class="source-card-title">Move sources</p>
            <table class="source-table" aria-label="Move source counts">
              <tbody>
                <tr>
                  <th scope="row">Human moves</th>
                  <td id="humanCount">0</td>
                </tr>
                <tr>
                  <th scope="row">Engine moves</th>
                  <td id="engineCount">0</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <div hidden aria-hidden="true">
          <input id="ep" type="text" value="-" spellcheck="false">
          <input id="halfmove" type="number" min="0" value="0">
          <input id="fullmove" type="number" min="1" value="1">
          <input id="castleK" type="checkbox" checked>
          <input id="castleQ" type="checkbox" checked>
          <input id="castlek" type="checkbox" checked>
          <input id="castleq" type="checkbox" checked>
        </div>
      </aside>
    </section>
  </main>

  <script type="module">
    import { Chess } from "https://cdn.jsdelivr.net/npm/chess.js@1.4.0/+esm";

    const pieceChars = {
      K: "♔",
      Q: "♕",
      R: "♖",
      B: "♗",
      N: "♘",
      P: "♙",
      k: "♚",
      q: "♛",
      r: "♜",
      b: "♝",
      n: "♞",
      p: "♟"
    };

    const defaultResult = {
      move: "--",
      note: ""
    };
    const defaultSourceCounts = {
      human: 0,
      engine: 0
    };

    const files = ["a", "b", "c", "d", "e", "f", "g", "h"];
    const ranks = [8, 7, 6, 5, 4, 3, 2, 1];
    const allSquares = [];
    const paletteOrder = ["K", "Q", "R", "B", "N", "P", "k", "q", "r", "b", "n", "p", "."];
    const boardEl = document.getElementById("board");
    const paletteEl = document.getElementById("palette");
    const resultEl = document.getElementById("result");
    const humanCountEl = document.getElementById("humanCount");
    const engineCountEl = document.getElementById("engineCount");
    const fenBoxEl = document.getElementById("fenBox");
    const turnEl = document.getElementById("turn");
    const epEl = document.getElementById("ep");
    const halfmoveEl = document.getElementById("halfmove");
    const fullmoveEl = document.getElementById("fullmove");
    const autoTurnEl = document.getElementById("autoTurn");
    const statusBoxEl = document.getElementById("statusBox");
    const editToolsEl = document.getElementById("editTools");
    const moveModeBtn = document.getElementById("moveModeBtn");
    const editModeBtn = document.getElementById("editModeBtn");
    const flipBtn = document.getElementById("flipBtn");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const historyHintEl = document.getElementById("historyHint");

    const castleKEl = document.getElementById("castleK");
    const castleQEl = document.getElementById("castleQ");
    const castlekEl = document.getElementById("castlek");
    const castleqEl = document.getElementById("castleq");

    const defaultSelection = "P";
    const modeMove = "move";
    const modeEdit = "edit";

    let selectedPiece = defaultSelection;
    let activeMode = modeMove;
    let boardFlipped = false;
    let selectedSquare = null;
    let lastMoveSquares = [];
    let boardState = {};
    let sourceCounts = { ...defaultSourceCounts };
    let historyStack = [];
    let redoStack = [];
    let openingBookPromise = null;
    const engineMoveCache = new Map();
    const squareRefs = {};
    const paletteButtons = {};
    const humanBookLastMove = {};
    const humanSources = new Set(["lichess-masters", "lichess-human"]);

    const startPosition = {
      a8: "r", b8: "n", c8: "b", d8: "q", e8: "k", f8: "b", g8: "n", h8: "r",
      a7: "p", b7: "p", c7: "p", d7: "p", e7: "p", f7: "p", g7: "p", h7: "p",
      a2: "P", b2: "P", c2: "P", d2: "P", e2: "P", f2: "P", g2: "P", h2: "P",
      a1: "R", b1: "N", c1: "B", d1: "Q", e1: "K", f1: "B", g1: "N", h1: "R"
    };

    for (const rank of ranks) {
      for (const file of files) {
        allSquares.push(file + rank);
      }
    }

    function isLightSquare(square) {
      return (files.indexOf(square[0]) + Number(square[1])) % 2 === 1;
    }

    function handlePaletteSelection(piece) {
      selectedPiece = piece;
      if (activeMode !== modeEdit) {
        setMode(modeEdit);
        return;
      }

      renderPalette();
      updateStatus();
    }

    function buildPaletteSkeleton() {
      if (paletteEl.childElementCount > 0) {
        return;
      }

      const fragment = document.createDocumentFragment();
      for (const piece of paletteOrder) {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.piece = piece;
        button.className = "piece-btn";

        if (piece !== ".") {
          button.className += piece === piece.toUpperCase() ? " piece-btn-white" : " piece-btn-black";
        }

        button.innerHTML = pieceMarkup(piece);
        button.addEventListener("click", () => handlePaletteSelection(piece));
        paletteButtons[piece] = button;
        fragment.appendChild(button);
      }

      paletteEl.appendChild(fragment);
    }

    function handleBoardSquareClick(event) {
      const square = event.currentTarget.dataset.square;
      const piece = boardState[square];

      if (activeMode === modeEdit) {
        if (selectedPiece === ".") {
          delete boardState[square];
        } else {
          boardState[square] = selectedPiece;
        }
        selectedSquare = null;
        lastMoveSquares = [];
        markPositionDirty();
        refreshUi();
        commitState();
        return;
      }

      if (!selectedSquare) {
        if (piece) {
          selectedSquare = square;
          refreshUi();
        }
        return;
      }

      if (selectedSquare === square) {
        selectedSquare = null;
        refreshUi();
        return;
      }

      const sourcePiece = boardState[selectedSquare];
      if (piece && sourcePiece && pieceColor(piece) === pieceColor(sourcePiece)) {
        selectedSquare = square;
        refreshUi();
        return;
      }

      movePiece(selectedSquare, square);
    }

    function handleBoardSquareContextMenu(event) {
      event.preventDefault();
      const square = event.currentTarget.dataset.square;
      if (!boardState[square]) {
        return;
      }

      delete boardState[square];
      if (selectedSquare === square) {
        selectedSquare = null;
      }
      lastMoveSquares = [];
      markPositionDirty();
      refreshUi();
      commitState();
    }

    function buildBoardSkeleton() {
      if (boardEl.childElementCount > 0) {
        return;
      }

      const fragment = document.createDocumentFragment();
      for (const square of allSquares) {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.square = square;
        button.className = "square " + (isLightSquare(square) ? "light" : "dark");
        button.addEventListener("click", handleBoardSquareClick);
        button.addEventListener("contextmenu", handleBoardSquareContextMenu);

        const pieceHost = document.createElement("span");
        pieceHost.className = "piece-host";

        const coord = document.createElement("span");
        coord.className = "coord";
        coord.textContent = square;

        button.appendChild(pieceHost);
        button.appendChild(coord);

        squareRefs[square] = {
          button,
          pieceHost,
          lastClassName: "",
          lastPiece: ""
        };
        fragment.appendChild(button);
      }

      boardEl.appendChild(fragment);
    }

    function visibleSquares() {
      return boardFlipped ? [...allSquares].reverse() : allSquares;
    }

    function updateBoardOrder() {
      const fragment = document.createDocumentFragment();
      for (const square of visibleSquares()) {
        fragment.appendChild(squareRefs[square].button);
      }
      boardEl.appendChild(fragment);
      flipBtn.classList.toggle("selected", boardFlipped);
    }

    function setResult(move, note) {
      const safeNote = note || "";
      resultEl.innerHTML = safeNote
        ? "<strong>" + move + "</strong><span>" + safeNote + "</span>"
        : "<strong>" + move + "</strong>";
    }

    function currentResultSnapshot() {
      const moveEl = resultEl.querySelector("strong");
      const noteEl = resultEl.querySelector("span");
      return {
        move: moveEl ? moveEl.textContent : defaultResult.move,
        note: noteEl ? noteEl.textContent : defaultResult.note
      };
    }

    function pieceMarkup(piece) {
      if (!piece) {
        return "";
      }
      if (piece === ".") {
        return '<span class="piece-clear" aria-hidden="true">×</span>';
      }
      return '<span class="piece-shell piece-char" aria-hidden="true">' + pieceChars[piece] + "</span>";
    }

    function pieceColor(piece) {
      return piece === piece.toUpperCase() ? "white" : "black";
    }

    function sanitizeSourceCounts(counts) {
      return {
        human: Math.max(0, Number(counts?.human) || 0),
        engine: Math.max(0, Number(counts?.engine) || 0)
      };
    }

    function updateSourceStats() {
      humanCountEl.textContent = String(sourceCounts.human);
      engineCountEl.textContent = String(sourceCounts.engine);
    }

    function resetSourceStats() {
      sourceCounts = { ...defaultSourceCounts };
      updateSourceStats();
    }

    function recordAnalyzeSource(source) {
      const normalizedSource = String(source || "").trim();
      if (!normalizedSource) {
        return;
      }

      if (humanSources.has(normalizedSource)) {
        sourceCounts.human += 1;
      } else {
        sourceCounts.engine += 1;
      }
      updateSourceStats();
    }

    function castleString() {
      let value = "";
      if (castleKEl.checked) value += "K";
      if (castleQEl.checked) value += "Q";
      if (castlekEl.checked) value += "k";
      if (castleqEl.checked) value += "q";
      return value || "-";
    }

    function currentCastlingState() {
      return {
        K: castleKEl.checked,
        Q: castleQEl.checked,
        k: castlekEl.checked,
        q: castleqEl.checked
      };
    }

    function setCastlingState(castling) {
      castleKEl.checked = Boolean(castling.K);
      castleQEl.checked = Boolean(castling.Q);
      castlekEl.checked = Boolean(castling.k);
      castleqEl.checked = Boolean(castling.q);
    }

    function setCastlingFromString(castling) {
      setCastlingState({
        K: castling.includes("K"),
        Q: castling.includes("Q"),
        k: castling.includes("k"),
        q: castling.includes("q")
      });
    }

    function buildPlacement() {
      const rows = [];
      for (const rank of ranks) {
        let row = "";
        let emptyRun = 0;
        for (const file of files) {
          const square = file + rank;
          const piece = boardState[square];
          if (!piece) {
            emptyRun += 1;
            continue;
          }
          if (emptyRun) {
            row += String(emptyRun);
            emptyRun = 0;
          }
          row += piece;
        }
        if (emptyRun) {
          row += String(emptyRun);
        }
        rows.push(row);
      }
      return rows.join("/");
    }

    function buildFen() {
      const ep = (epEl.value || "-").trim() || "-";
      return [
        buildPlacement(),
        turnEl.value,
        castleString(),
        ep,
        Math.max(0, Number(halfmoveEl.value || 0)),
        Math.max(1, Number(fullmoveEl.value || 1))
      ].join(" ");
    }

    function updateFen() {
      if (fenBoxEl) {
        fenBoxEl.textContent = buildFen();
      }
    }

    function normalizeFenKey(fen) {
      return String(fen || "").trim().split(/\s+/).slice(0, 4).join(" ");
    }

    function createGame(fen) {
      try {
        return new Chess(fen);
      } catch (error) {
        return null;
      }
    }

    function gameOverResult(game) {
      if (!game) {
        return null;
      }
      if (typeof game.isGameOver === "function" && !game.isGameOver()) {
        return null;
      }
      if (typeof game.isCheckmate === "function" && game.isCheckmate()) {
        return { move: "mate", note: "" };
      }
      if (typeof game.isStalemate === "function" && game.isStalemate()) {
        return { move: "draw", note: "" };
      }
      if (typeof game.isDraw === "function" && game.isDraw()) {
        return { move: "draw", note: "" };
      }
      return { move: "game over", note: "" };
    }

    function pieceValue(piece) {
      const key = String(piece || "").toLowerCase();
      if (key === "p") return 100;
      if (key === "n") return 320;
      if (key === "b") return 330;
      if (key === "r") return 500;
      if (key === "q") return 900;
      if (key === "k") return 20000;
      return 0;
    }

    function materialBalance(game, perspective) {
      let score = 0;
      for (const row of game.board()) {
        for (const piece of row) {
          if (!piece) {
            continue;
          }
          const value = pieceValue(piece.type);
          score += piece.color === perspective ? value : -value;
        }
      }
      return score;
    }

    function hasImmediateCheck(game) {
      if (typeof game.isCheck === "function") {
        return game.isCheck();
      }
      if (typeof game.inCheck === "function") {
        return game.inCheck();
      }
      return false;
    }

    function moveToUci(move) {
      return move.from + move.to + (move.promotion || "");
    }

    function emergencyLocalMove(fen) {
      const game = createGame(fen);
      if (!game) {
        return null;
      }

      const legalMoves = game.moves({ verbose: true });
      if (!Array.isArray(legalMoves) || legalMoves.length === 0) {
        return null;
      }

      const perspective = game.turn();
      const bestMove = [...legalMoves]
        .map((move) => {
          let score = 0;
          if (move.captured) {
            score += 2000 + pieceValue(move.captured);
          }
          if (move.promotion) {
            score += 5000 + pieceValue(move.promotion);
          }

          game.move(move);
          if (typeof game.isCheckmate === "function" && game.isCheckmate()) {
            score += 1000000;
          }
          if (hasImmediateCheck(game)) {
            score += 1500;
          }
          score += materialBalance(game, perspective);
          game.undo();

          const fromCenter = Math.abs(move.from.charCodeAt(0) - 101) + Math.abs(Number(move.from[1]) - 4.5);
          const toCenter = Math.abs(move.to.charCodeAt(0) - 101) + Math.abs(Number(move.to[1]) - 4.5);
          score += Math.round((fromCenter - toCenter) * 10);
          return { move, score };
        })
        .sort((left, right) => right.score - left.score || moveToUci(left.move).localeCompare(moveToUci(right.move)))[0];

      if (!bestMove) {
        return null;
      }

      return {
        source: "browser-fallback",
        uci: moveToUci(bestMove.move),
      };
    }

    function fetchWithTimeout(resource, options = {}, timeoutMs = 2500) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
      return fetch(resource, {
        ...options,
        signal: controller.signal,
      }).finally(() => window.clearTimeout(timeoutId));
    }

    async function loadOpeningBook() {
      if (!openingBookPromise) {
        openingBookPromise = fetch("opening-book.json", { cache: "force-cache" })
          .then((response) => {
            if (!response.ok) {
              throw new Error("opening book unavailable");
            }
            return response.json();
          })
          .catch(() => ({ positions: {} }));
      }
      return openingBookPromise;
    }

    function pickHumanBookMove(fen) {
      return loadOpeningBook().then((book) => {
        const key = normalizeFenKey(fen);
        const entry = book?.positions?.[key];
        if (!entry || !Array.isArray(entry.moves) || entry.moves.length === 0) {
          return null;
        }

        const moves = entry.moves
          .map((move) => String(move))
          .filter((move) => {
            if (!move) {
              return false;
            }
            try {
              applyUciOnFen(fen, move);
              return true;
            } catch (error) {
              return false;
            }
          });
        if (moves.length === 0) {
          return null;
        }

        const lastMove = humanBookLastMove[key] || "";
        const pool =
          moves.length > 1 && lastMove
            ? moves.filter((move) => move !== lastMove)
            : moves;
        const choices = pool.length > 0 ? pool : moves;
        const uci = choices[Math.floor(Math.random() * choices.length)];
        humanBookLastMove[key] = uci;
        return {
          source: String(entry.source || "lichess-human"),
          uci,
        };
      });
    }

    function applyUciOnFen(fen, uci) {
      const game = new Chess(fen);
      const move = game.move({
        from: uci.slice(0, 2),
        to: uci.slice(2, 4),
        promotion: uci.length > 4 ? uci.slice(4, 5) : undefined,
      });
      if (!move) {
        throw new Error("illegal move returned by provider");
      }
      return {
        san: move.san,
        fen: game.fen(),
      };
    }

    async function cloudEvalMove(fen) {
      const response = await fetchWithTimeout(
        "https://lichess.org/api/cloud-eval?fen=" + encodeURIComponent(fen),
        {
          headers: {
            Accept: "application/json",
          },
        },
        2200
      );
      if (!response.ok) {
        throw new Error("lichess cloud eval failed");
      }

      const payload = await response.json();
      const bestLine = payload?.pvs?.[0]?.moves || "";
      const uci = String(bestLine).trim().split(/\s+/)[0];
      if (!uci) {
        throw new Error("lichess cloud eval returned no move");
      }

      return {
        source: "lichess-cloud",
        uci,
      };
    }

    async function chessApiMove(fen) {
      const response = await fetchWithTimeout("https://chess-api.com/v1", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          fen,
          depth: 12,
          variants: 1,
        }),
      }, 2800);
      if (!response.ok) {
        throw new Error("chess-api failed");
      }

      const payload = await response.json();
      if (!payload?.move) {
        throw new Error("chess-api returned no move");
      }

      return {
        source: "chess-api",
        uci: String(payload.move),
      };
    }

    async function chessDbMove(fen) {
      const response = await fetchWithTimeout(
        "https://www.chessdb.cn/cdb.php?action=queryall&board=" + encodeURIComponent(fen),
        {},
        2200
      );
      if (!response.ok) {
        throw new Error("chessdb failed");
      }

      const payload = (await response.text()).trim();
      const first = payload.split("|", 1)[0] || "";
      if (!first.startsWith("move:")) {
        throw new Error("chessdb returned no move");
      }

      return {
        source: "chessdb",
        uci: first.split(",", 1)[0].split(":", 1)[1],
      };
    }

    async function resolveEngineMove(fen) {
      const cacheKey = normalizeFenKey(fen);
      if (engineMoveCache.has(cacheKey)) {
        return engineMoveCache.get(cacheKey);
      }

      const providers = [cloudEvalMove, chessApiMove, chessDbMove];
      let lastError = null;

      for (const provider of providers) {
        try {
          const move = await provider(fen);
          applyUciOnFen(fen, move.uci);
          engineMoveCache.set(cacheKey, move);
          return move;
        } catch (error) {
          lastError = error;
        }
      }

      const emergencyMove = emergencyLocalMove(fen);
      if (emergencyMove) {
        engineMoveCache.set(cacheKey, emergencyMove);
        return emergencyMove;
      }

      throw lastError || new Error("No engine provider available");
    }

    async function resolveBestMove(fen) {
      const humanMove = await pickHumanBookMove(fen);
      if (humanMove) {
        return humanMove;
      }
      return resolveEngineMove(fen);
    }

    function applyFenPosition(fen, moveUci = "") {
      const parts = String(fen || "").trim().split(/\s+/);
      if (parts.length < 6) {
        throw new Error("Invalid FEN returned by engine");
      }

      const [placement, turn, castling, ep, halfmove, fullmove] = parts;
      const rows = placement.split("/");
      if (rows.length !== 8) {
        throw new Error("Invalid placement returned by engine");
      }

      const nextBoardState = {};
      for (let rowIndex = 0; rowIndex < rows.length; rowIndex += 1) {
        const row = rows[rowIndex];
        let fileIndex = 0;

        for (const symbol of row) {
          if (/\d/.test(symbol)) {
            fileIndex += Number(symbol);
            continue;
          }

          if (!files[fileIndex]) {
            throw new Error("Invalid square data returned by engine");
          }

          nextBoardState[files[fileIndex] + ranks[rowIndex]] = symbol;
          fileIndex += 1;
        }

        if (fileIndex !== 8) {
          throw new Error("Invalid rank data returned by engine");
        }
      }

      boardState = nextBoardState;
      turnEl.value = turn === "b" ? "b" : "w";
      setCastlingFromString(castling === "-" ? "" : castling);
      epEl.value = ep || "-";
      halfmoveEl.value = String(Math.max(0, Number(halfmove) || 0));
      fullmoveEl.value = String(Math.max(1, Number(fullmove) || 1));
      selectedSquare = null;
      lastMoveSquares = moveUci ? [moveUci.slice(0, 2), moveUci.slice(2, 4)] : [];
      refreshUi();
    }

    function toggleTurn() {
      turnEl.value = turnEl.value === "w" ? "b" : "w";
    }

    function updateHistoryButtons() {
      undoBtn.disabled = historyStack.length <= 1;
      redoBtn.disabled = redoStack.length === 0;
      if (historyHintEl) {
        historyHintEl.textContent = "";
      }
    }

    function updateStatus() {
      if (!statusBoxEl) {
        return;
      }

      if (activeMode === modeMove) {
        if (selectedSquare) {
          statusBoxEl.textContent =
            "Selected " + selectedSquare + ". Click the target square to move there.";
          return;
        }
        statusBoxEl.textContent =
          "Move mode: click a piece, then click its destination. Use Undo if you want to roll back.";
        return;
      }

      const editLabel = selectedPiece === "." ? "eraser" : "piece " + selectedPiece;
      statusBoxEl.textContent =
        "Edit mode: " + editLabel + " selected. Click any square to paint it, and use the arrows to step back.";
    }

    function updateModeChrome() {
      moveModeBtn.classList.toggle("selected", activeMode === modeMove);
      editModeBtn.classList.toggle("selected", activeMode === modeEdit);
      editToolsEl.open = activeMode === modeEdit;
    }

    function refreshUi() {
      updateModeChrome();
      renderPalette();
      renderBoard();
      updateBoardOrder();
      updateFen();
      updateSourceStats();
      updateStatus();
      updateHistoryButtons();
    }

    function markPositionDirty() {
      setResult(defaultResult.move, defaultResult.note);
    }

    function captureState() {
      return {
        boardState: { ...boardState },
        turn: turnEl.value,
        ep: epEl.value,
        halfmove: halfmoveEl.value,
        fullmove: fullmoveEl.value,
        castling: currentCastlingState(),
        autoTurn: autoTurnEl.checked,
        activeMode,
        boardFlipped,
        selectedPiece,
        lastMoveSquares: [...lastMoveSquares],
        sourceCounts: sanitizeSourceCounts(sourceCounts),
        result: currentResultSnapshot()
      };
    }

    function stateFingerprint(state) {
      return JSON.stringify(state);
    }

    function restoreState(state) {
      boardState = { ...(state.boardState || {}) };
      turnEl.value = state.turn || "w";
      epEl.value = state.ep ?? "-";
      halfmoveEl.value = state.halfmove ?? "0";
      fullmoveEl.value = state.fullmove ?? "1";
      setCastlingState(state.castling || {});
      autoTurnEl.checked = state.autoTurn !== false;
      activeMode = state.activeMode || modeMove;
      boardFlipped = Boolean(state.boardFlipped);
      selectedPiece = state.selectedPiece || defaultSelection;
      selectedSquare = null;
      lastMoveSquares = [...(state.lastMoveSquares || [])];
      sourceCounts = sanitizeSourceCounts(state.sourceCounts);
      refreshUi();
      if (state.result) {
        setResult(state.result.move, state.result.note);
      } else {
        setResult(defaultResult.move, defaultResult.note);
      }
    }

    function commitState() {
      const snapshot = captureState();
      const fingerprint = stateFingerprint(snapshot);
      const previous =
        historyStack.length > 0
          ? stateFingerprint(historyStack[historyStack.length - 1])
          : null;

      if (fingerprint !== previous) {
        historyStack.push(snapshot);
        redoStack = [];
      }
      updateHistoryButtons();
    }

    function undoHistory() {
      if (historyStack.length <= 1) {
        return;
      }

      const current = historyStack.pop();
      redoStack.push(current);
      restoreState(historyStack[historyStack.length - 1]);
      updateHistoryButtons();
    }

    function redoHistory() {
      if (redoStack.length === 0) {
        return;
      }

      const next = redoStack.pop();
      historyStack.push(next);
      restoreState(next);
      updateHistoryButtons();
    }

    function setMode(mode) {
      activeMode = mode;
      selectedSquare = null;
      refreshUi();
    }

    function toggleBoardFlip() {
      boardFlipped = !boardFlipped;
      refreshUi();
      commitState();
    }

    function applyStartPosition(record = true) {
      boardState = { ...startPosition };
      selectedSquare = null;
      lastMoveSquares = [];
      activeMode = modeMove;
      turnEl.value = "w";
      epEl.value = "-";
      halfmoveEl.value = "0";
      fullmoveEl.value = "1";
      autoTurnEl.checked = true;
      setCastlingState({ K: true, Q: true, k: true, q: true });
      markPositionDirty();
      refreshUi();
      if (record) {
        commitState();
      }
    }

    function clearBoard(record = true) {
      boardState = {};
      selectedSquare = null;
      lastMoveSquares = [];
      resetSourceStats();
      turnEl.value = "w";
      epEl.value = "-";
      halfmoveEl.value = "0";
      fullmoveEl.value = "1";
      setCastlingState({ K: false, Q: false, k: false, q: false });
      markPositionDirty();
      refreshUi();
      if (record) {
        commitState();
      }
    }

    function handlePositionMetaChange() {
      selectedSquare = null;
      lastMoveSquares = [];
      markPositionDirty();
      refreshUi();
      commitState();
    }

    function movePiece(fromSquare, toSquare) {
      const movingPiece = boardState[fromSquare];
      if (!movingPiece || fromSquare === toSquare) {
        return;
      }

      boardState[toSquare] = movingPiece;
      delete boardState[fromSquare];
      selectedSquare = null;
      lastMoveSquares = [fromSquare, toSquare];

      if (autoTurnEl.checked) {
        toggleTurn();
      }

      markPositionDirty();
      refreshUi();
      commitState();
    }

    function renderPalette() {
      for (const piece of paletteOrder) {
        paletteButtons[piece].classList.toggle("selected", piece === selectedPiece);
      }
    }

    function renderBoard() {
      const highlightedSquares = new Set(lastMoveSquares);

      for (const square of allSquares) {
        const piece = boardState[square];
        const ref = squareRefs[square];
        let className = "square " + (isLightSquare(square) ? "light" : "dark");

        if (selectedSquare === square) {
          className += " selected-square";
        }
        if (highlightedSquares.has(square)) {
          className += " last-move";
        }
        if (piece) {
          className += piece === piece.toUpperCase() ? " white-piece" : " black-piece";
        }

        if (ref.lastClassName !== className) {
          ref.button.className = className;
          ref.lastClassName = className;
        }

        const normalizedPiece = piece || "";
        if (ref.lastPiece !== normalizedPiece) {
          ref.pieceHost.innerHTML = pieceMarkup(piece);
          ref.lastPiece = normalizedPiece;
        }
      }
    }

    async function analyze() {
      if (analyzeBtn.disabled) {
        return;
      }

      const fen = buildFen();
      const game = createGame(fen);
      updateFen();
      analyzeBtn.disabled = true;
      setResult("...", "");

      try {
        if (!game) {
          setResult("fix board", "");
          return;
        }

        const terminalState = gameOverResult(game);
        if (terminalState) {
          setResult(terminalState.move, terminalState.note);
          return;
        }

        const bestMove = await resolveBestMove(fen);
        const applied = applyUciOnFen(fen, bestMove.uci);
        applyFenPosition(applied.fen, bestMove.uci);
        recordAnalyzeSource(bestMove.source);
        setResult(applied.san, "");
        commitState();
      } catch (error) {
        const emergencyMove = emergencyLocalMove(fen);
        if (emergencyMove) {
          const applied = applyUciOnFen(fen, emergencyMove.uci);
          applyFenPosition(applied.fen, emergencyMove.uci);
          recordAnalyzeSource(emergencyMove.source);
          setResult(applied.san, "");
          commitState();
          return;
        }
        setResult("fix board", "");
      } finally {
        analyzeBtn.disabled = false;
      }
    }

    document.getElementById("startBtn").addEventListener("click", () => applyStartPosition(true));
    document.getElementById("clearBtn").addEventListener("click", () => clearBoard(true));
    flipBtn.addEventListener("click", toggleBoardFlip);
    analyzeBtn.addEventListener("click", analyze);
    moveModeBtn.addEventListener("click", () => setMode(modeMove));
    editModeBtn.addEventListener("click", () => setMode(modeEdit));
    undoBtn.addEventListener("click", undoHistory);
    redoBtn.addEventListener("click", redoHistory);

    turnEl.addEventListener("change", handlePositionMetaChange);
    autoTurnEl.addEventListener("change", handlePositionMetaChange);
    epEl.addEventListener("input", updateFen);
    epEl.addEventListener("change", handlePositionMetaChange);
    halfmoveEl.addEventListener("input", updateFen);
    halfmoveEl.addEventListener("change", handlePositionMetaChange);
    fullmoveEl.addEventListener("input", updateFen);
    fullmoveEl.addEventListener("change", handlePositionMetaChange);
    castleKEl.addEventListener("change", handlePositionMetaChange);
    castleQEl.addEventListener("change", handlePositionMetaChange);
    castlekEl.addEventListener("change", handlePositionMetaChange);
    castleqEl.addEventListener("change", handlePositionMetaChange);

    document.addEventListener("keydown", (event) => {
      const modifier = event.metaKey || event.ctrlKey;
      if (!modifier) {
        return;
      }

      const key = event.key.toLowerCase();
      if (key === "z") {
        event.preventDefault();
        if (event.shiftKey) {
          redoHistory();
        } else {
          undoHistory();
        }
        return;
      }

      if (key === "y") {
        event.preventDefault();
        redoHistory();
      }
    });

    buildPaletteSkeleton();
    buildBoardSkeleton();
    setResult(defaultResult.move, defaultResult.note);
    applyStartPosition(false);
    setMode(modeMove);
    historyStack = [captureState()];
    redoStack = [];
    updateHistoryButtons();
  </script>
</body>
</html>
