<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lvcxl. | Chess Atelier</title>
  <style>
    :root {
      --bg: #060c14;
      --bg-deep: #03070e;
      --bg-mid: #0b1420;
      --panel: rgba(11, 18, 29, 0.84);
      --panel-strong: rgba(10, 17, 28, 0.96);
      --panel-soft: rgba(20, 32, 49, 0.72);
      --panel-sheen: rgba(255, 255, 255, 0.04);
      --ink: #edf3ff;
      --muted: #9aaac3;
      --accent: #f1b362;
      --accent-strong: #ff8a45;
      --accent-soft: rgba(241, 179, 98, 0.14);
      --accent-cool: #90b8ff;
      --light-square: #9caec5;
      --dark-square: #25354d;
      --light-piece: #f8fbff;
      --dark-piece: #101724;
      --border: rgba(151, 174, 210, 0.18);
      --border-strong: rgba(241, 179, 98, 0.28);
      --shadow: 0 30px 90px rgba(0, 0, 0, 0.46);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #07101a 0%, #040912 100%);
    }

    body::before,
    body::after {
      display: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px;
    }

    .site-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      padding: 14px 18px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background:
        linear-gradient(180deg, rgba(12, 20, 31, 0.92) 0%, rgba(8, 13, 21, 0.9) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 18px 44px rgba(0, 0, 0, 0.24);
      animation: riseFade 720ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-emblem {
      position: relative;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(241, 179, 98, 0.18);
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.14), transparent 26%),
        linear-gradient(160deg, rgba(35, 24, 12, 0.92) 0%, rgba(17, 25, 38, 0.94) 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.04),
        0 10px 26px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .brand-emblem span {
      position: absolute;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow: 0 0 18px rgba(255, 143, 69, 0.32);
    }

    .brand-emblem span:nth-child(1) {
      width: 20px;
      height: 2px;
      top: 13px;
      left: 12px;
      transform: rotate(48deg);
    }

    .brand-emblem span:nth-child(2) {
      width: 22px;
      height: 2px;
      top: 20px;
      left: 11px;
      transform: rotate(-48deg);
    }

    .brand-emblem span:nth-child(3) {
      width: 6px;
      height: 6px;
      right: 10px;
      bottom: 9px;
    }

    .brand-lockup-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .brand-lockup-copy strong {
      font-family: "Cormorant Garamond", "Didot", serif;
      font-size: 1.7rem;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      color: #fff4df;
    }

    .brand-lockup-copy span {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .site-status {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #d6e2f5;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow: 0 0 14px rgba(255, 143, 69, 0.5);
    }

    .hero {
      margin-bottom: 28px;
    }

    .hero-shell {
      position: relative;
      padding: 30px;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background:
        linear-gradient(180deg, rgba(12, 19, 30, 0.94) 0%, rgba(7, 12, 20, 0.94) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 26px 70px rgba(0, 0, 0, 0.34);
      overflow: hidden;
    }

    .hero-shell::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 33px;
      border: 1px solid rgba(241, 179, 98, 0.08);
      pointer-events: none;
    }

    .hero-shell::after {
      content: "";
      position: absolute;
      inset: auto -14% 8% auto;
      width: 320px;
      height: 320px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255, 158, 82, 0.16) 0%, rgba(255, 158, 82, 0) 68%);
      filter: blur(6px);
      pointer-events: none;
    }

    .hero-grid {
      display: grid;
      gap: 36px;
      align-items: center;
    }

    @media (min-width: 1040px) {
      .hero-grid {
        grid-template-columns: minmax(0, 1.08fr) minmax(300px, 0.92fr);
      }
    }

    .hero-copy {
      display: grid;
      gap: 16px;
    }

    .signal-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .eyebrow {
      width: fit-content;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ffddaa;
      font-weight: 700;
      border: 1px solid rgba(243, 179, 95, 0.2);
      background:
        linear-gradient(180deg, rgba(243, 179, 95, 0.12) 0%, rgba(243, 179, 95, 0.06) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .hero-copy > * {
      animation: riseFade 760ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .hero-copy > *:nth-child(1) { animation-delay: 0.02s; }
    .hero-copy > *:nth-child(2) { animation-delay: 0.08s; }
    .hero-copy > *:nth-child(3) { animation-delay: 0.14s; }
    .hero-copy > *:nth-child(4) { animation-delay: 0.2s; }

    .signal {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: 999px;
      font-size: 0.82rem;
      color: #d8e4fb;
      background:
        linear-gradient(180deg, rgba(16, 25, 38, 0.86) 0%, rgba(11, 19, 30, 0.78) 100%);
      border: 1px solid rgba(151, 174, 210, 0.14);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .signal::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow: 0 0 16px rgba(255, 143, 69, 0.52);
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", "Didot", "Bodoni 72", serif;
      font-size: clamp(2.6rem, 4.8vw, 4.6rem);
      font-weight: 600;
      line-height: 0.98;
      letter-spacing: 0.01em;
      max-width: 820px;
      text-wrap: balance;
      color: #fff7eb;
      text-shadow: 0 10px 32px rgba(0, 0, 0, 0.28);
    }

    .hero p {
      margin: 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 8px;
    }

    .hero-stat {
      position: relative;
      padding: 16px 16px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(15, 24, 37, 0.82) 0%, rgba(10, 16, 26, 0.76) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .hero-stat::after {
      content: "";
      position: absolute;
      inset: auto auto -48px -30px;
      width: 110px;
      height: 110px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255, 164, 92, 0.16) 0%, rgba(255, 164, 92, 0) 72%);
      pointer-events: none;
    }

    .hero-stat strong {
      display: block;
      margin-bottom: 8px;
      font-family: "Cormorant Garamond", "Didot", serif;
      font-size: 1.28rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #fff2d8;
    }

    .hero-stat span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.55;
    }

    .brand-stage {
      position: relative;
      display: grid;
      gap: 16px;
    }

    .brand-orbit {
      position: absolute;
      inset: -24px;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      background:
        radial-gradient(circle at center, rgba(255, 168, 95, 0.1) 0%, rgba(255, 168, 95, 0) 62%);
      filter: blur(0.2px);
      pointer-events: none;
    }

    .brand-orbit::before,
    .brand-orbit::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(241, 179, 98, 0.12);
    }

    .brand-orbit::before {
      inset: 10% -4%;
    }

    .brand-orbit::after {
      inset: -4% 12%;
    }

    .logo-card {
      position: relative;
      overflow: hidden;
      padding: 20px;
      border-radius: 30px;
      background:
        linear-gradient(160deg, rgba(18, 28, 42, 0.98) 0%, rgba(8, 13, 21, 0.98) 100%);
      border: 1px solid rgba(243, 179, 95, 0.18);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 28px 70px rgba(0, 0, 0, 0.4);
    }

    .logo-card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 24px;
      border: 1px solid rgba(243, 179, 95, 0.16);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.06), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
      pointer-events: none;
    }

    .logo-card::after {
      display: none;
    }

    .logo-svg {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.34));
    }

    .logo-plaque {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 6px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      text-align: center;
    }

    .logo-wordmark {
      font-family: "Cormorant Garamond", "Didot", serif;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: #fff0d3;
    }

    .logo-subline {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .logo-caption {
      margin: 0 10px;
      color: #cfdaf0;
      font-family: "Cormorant Garamond", "Baskerville", serif;
      font-size: 1.1rem;
      line-height: 1.5;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .layout {
      display: grid;
      gap: 18px;
      align-items: start;
    }

    @media (min-width: 1040px) {
      .layout {
        grid-template-columns: minmax(0, 680px) minmax(280px, 360px);
      }
    }

    .panel {
      position: relative;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-strong) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .panel::before {
      display: none;
    }

    .board-panel {
      padding: 14px;
    }

    .board-stage {
      position: relative;
      padding: 10px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(8, 13, 22, 0.96);
      overflow: hidden;
    }

    .board-stage::before {
      display: none;
    }

    .board-wrap {
      width: min(100%, 630px);
      margin: 0 auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 22px 56px rgba(0, 0, 0, 0.4);
    }

    .square {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      border: 0;
      padding: 4px;
      cursor: pointer;
      font-size: clamp(2rem, 5.8vw, 3rem);
      line-height: 1;
      transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .square::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.045) 0%, rgba(255, 255, 255, 0) 36%);
      pointer-events: none;
    }

    .square:hover {
      transform: scale(0.985);
      filter: brightness(1.08) saturate(1.03);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .square.light {
      background:
        radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.08), transparent 30%),
        linear-gradient(180deg, #92a4bc 0%, var(--light-square) 100%);
    }

    .square.dark {
      background:
        radial-gradient(circle at 72% 74%, rgba(255, 255, 255, 0.04), transparent 32%),
        linear-gradient(180deg, #304460 0%, var(--dark-square) 100%);
    }

    .piece-host {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .piece-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .piece-char {
      font-size: 3rem;
      line-height: 1;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.22);
    }

    .piece-svg {
      width: 82%;
      height: 82%;
      overflow: visible;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.22));
      transition: transform 140ms ease, filter 140ms ease;
    }

    .square:hover .piece-svg,
    .piece-btn:hover .piece-svg {
      transform: translateY(-1px) scale(1.02);
    }

    .piece-svg .piece-solid {
      fill: currentColor;
      stroke: var(--piece-line);
      stroke-width: 2.8;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .piece-svg .piece-highlight {
      fill: var(--piece-glow);
    }

    .piece-svg .piece-shade {
      fill: var(--piece-shade);
    }

    .piece-svg .piece-cut {
      fill: var(--piece-cut);
    }

    .piece-svg .piece-cut-line {
      fill: none;
      stroke: var(--piece-cut);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .square.white-piece {
      color: var(--light-piece);
      --piece-line: rgba(19, 27, 38, 0.34);
      --piece-glow: rgba(255, 255, 255, 0.38);
      --piece-shade: rgba(76, 98, 128, 0.16);
      --piece-cut: rgba(26, 39, 56, 0.22);
    }

    .square.black-piece {
      color: #0f1724;
      --piece-line: rgba(255, 255, 255, 0.12);
      --piece-glow: rgba(255, 255, 255, 0.07);
      --piece-shade: rgba(255, 255, 255, 0.06);
      --piece-cut: rgba(255, 255, 255, 0.16);
    }

    .square.selected-square::after,
    .square.last-move::after {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 14px;
      pointer-events: none;
    }

    .square.selected-square::after {
      border: 3px solid rgba(243, 179, 95, 0.95);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        0 0 18px rgba(243, 179, 95, 0.28);
    }

    .square.last-move::after {
      background: rgba(255, 184, 91, 0.16);
      border: 2px solid rgba(255, 184, 91, 0.34);
    }

    .coord {
      position: absolute;
      left: 8px;
      bottom: 6px;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      opacity: 0.66;
      background: rgba(9, 16, 25, 0.16);
      pointer-events: none;
    }

    .controls {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .section {
      display: grid;
      gap: 10px;
    }

    .section h2 {
      margin: 0;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #c9d6ee;
    }

    .mode-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .piece-btn,
    .action-btn,
    select,
    input {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(15, 24, 37, 0.9);
      color: var(--ink);
    }

    .piece-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      font-size: 1.8rem;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .piece-btn .piece-svg {
      width: 62%;
      height: 62%;
    }

    .piece-btn .piece-char {
      font-size: 2.2rem;
    }

    .piece-btn.piece-btn-white {
      color: var(--light-piece);
      --piece-line: rgba(19, 27, 38, 0.34);
      --piece-glow: rgba(255, 255, 255, 0.38);
      --piece-shade: rgba(76, 98, 128, 0.16);
      --piece-cut: rgba(26, 39, 56, 0.22);
    }

    .piece-btn.piece-btn-black {
      color: #0f1724;
      --piece-line: rgba(255, 255, 255, 0.12);
      --piece-glow: rgba(255, 255, 255, 0.07);
      --piece-shade: rgba(255, 255, 255, 0.06);
      --piece-cut: rgba(255, 255, 255, 0.16);
    }

    .piece-clear {
      font-size: 1.5rem;
      font-weight: 700;
      opacity: 0.72;
      pointer-events: none;
    }

    .piece-btn:hover,
    .action-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(243, 179, 95, 0.42);
    }

    .piece-btn.selected {
      border-color: var(--accent);
      background: linear-gradient(180deg, rgba(243, 179, 95, 0.22) 0%, rgba(243, 179, 95, 0.1) 100%);
      box-shadow: inset 0 0 0 1px rgba(243, 179, 95, 0.22);
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .history-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .action-btn {
      min-height: 46px;
      padding: 0 14px;
      font-family: "Manrope", "Avenir Next", sans-serif;
      letter-spacing: 0.04em;
      font-weight: 700;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, #e1a85f 0%, #ff7a42 54%, #ff5a42 100%);
      color: #10141b;
      border: 0;
      box-shadow: 0 16px 36px rgba(255, 106, 61, 0.26);
    }

    .action-btn.selected {
      border-color: var(--accent);
      background: linear-gradient(180deg, rgba(243, 179, 95, 0.18) 0%, rgba(243, 179, 95, 0.08) 100%);
      box-shadow: inset 0 0 0 1px rgba(243, 179, 95, 0.18);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      border-color: var(--border);
      box-shadow: none;
    }

    .history-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .history-icon {
      font-size: 1.1rem;
      line-height: 1;
    }

    .field-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label,
    details summary {
      font-size: 0.88rem;
      font-weight: 700;
      color: #c6d4eb;
    }

    select,
    input {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      font: inherit;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    details {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: rgba(15, 25, 39, 0.78);
    }

    details[open] {
      background: rgba(16, 27, 42, 0.96);
    }

    details summary {
      cursor: pointer;
      list-style: none;
    }

    details summary::-webkit-details-marker {
      display: none;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .checks label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .result {
      min-height: 90px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border-strong);
      background:
        radial-gradient(circle at top right, rgba(255, 143, 69, 0.16), transparent 32%),
        linear-gradient(180deg, rgba(20, 33, 48, 0.98) 0%, rgba(13, 21, 33, 0.96) 100%);
      display: grid;
      gap: 4px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .result strong {
      font-family: "Cormorant Garamond", "Didot", serif;
      font-size: 2.2rem;
      line-height: 1;
      letter-spacing: 0.04em;
      color: #fff0d2;
    }

    .result span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .source-card {
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(8, 14, 22, 0.92);
    }

    .source-card-title {
      margin: 0 0 10px;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .source-table {
      width: 100%;
      border-collapse: collapse;
      color: #dce7fa;
    }

    .source-table th,
    .source-table td {
      padding: 8px 0;
      border-top: 1px solid rgba(122, 154, 193, 0.12);
    }

    .source-table tr:first-child th,
    .source-table tr:first-child td {
      border-top: 0;
    }

    .source-table th {
      text-align: left;
      font-size: 0.92rem;
      font-weight: 600;
      color: #d8e4f8;
    }

    .source-table td {
      text-align: right;
      font-family: "Courier New", monospace;
      font-size: 1rem;
      color: #fff0d2;
    }

    .fen-box {
      min-height: 88px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(8, 14, 22, 0.92);
      font-family: "Courier New", monospace;
      font-size: 0.9rem;
      line-height: 1.45;
      word-break: break-all;
      color: #dce7fa;
    }

    .hint {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .status-box,
    .history-hint,
    .panel-head,
    .analysis-note,
    .hero,
    .site-bar {
      display: none;
    }

    @keyframes riseFade {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 12px;
      }

      .controls,
      .board-panel {
        padding: 12px;
      }

      .board-stage {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="layout">
      <section class="panel board-panel">
        <div class="board-stage">
          <div class="board-wrap">
            <div id="board" class="board" aria-label="Chess board"></div>
          </div>
        </div>
      </section>

      <aside class="panel controls">
        <section class="section">
          <div class="mode-row">
            <button id="moveModeBtn" class="action-btn selected">Move pieces</button>
            <button id="editModeBtn" class="action-btn">Edit pieces</button>
          </div>
          <div class="action-row">
            <button id="startBtn" class="action-btn">Start position</button>
            <button id="clearBtn" class="action-btn">Clear board</button>
            <button id="flipBtn" class="action-btn" type="button">Flip board</button>
          </div>
          <div class="history-row">
            <button id="undoBtn" class="action-btn history-btn" type="button">
              <span class="history-icon">↶</span>
              <span>Undo</span>
            </button>
            <button id="redoBtn" class="action-btn history-btn" type="button">
              <span class="history-icon">↷</span>
              <span>Redo</span>
            </button>
          </div>
        </section>

        <details id="editTools">
          <summary>Edit palette</summary>
          <div id="palette" class="palette" style="margin-top: 12px;"></div>
        </details>

        <section class="section">
          <div class="field">
            <label for="turn">Side to move</label>
            <select id="turn">
              <option value="w">White</option>
              <option value="b">Black</option>
            </select>
          </div>
          <label class="hint" style="display: flex; align-items: center; gap: 8px;">
            <input id="autoTurn" type="checkbox" checked>
            Auto-switch turn after each manual move
          </label>
        </section>

        <section class="section">
          <button id="analyzeBtn" class="action-btn primary">Best move</button>
          <div id="result" class="result">
            <strong>--</strong>
          </div>
        </section>

        <section class="section">
          <div class="source-card">
            <p class="source-card-title">Move sources</p>
            <table class="source-table" aria-label="Move source counts">
              <tbody>
                <tr>
                  <th scope="row">Human moves</th>
                  <td id="humanCount">0</td>
                </tr>
                <tr>
                  <th scope="row">Engine moves</th>
                  <td id="engineCount">0</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <div hidden aria-hidden="true">
          <input id="ep" type="text" value="-" spellcheck="false">
          <input id="halfmove" type="number" min="0" value="0">
          <input id="fullmove" type="number" min="1" value="1">
          <input id="castleK" type="checkbox" checked>
          <input id="castleQ" type="checkbox" checked>
          <input id="castlek" type="checkbox" checked>
          <input id="castleq" type="checkbox" checked>
        </div>
      </aside>
    </section>
  </main>

  <script type="module">
    import { Chess } from "https://cdn.jsdelivr.net/npm/chess.js@1.4.0/+esm";

    const pieceChars = {
      K: "♔",
      Q: "♕",
      R: "♖",
      B: "♗",
      N: "♘",
      P: "♙",
      k: "♚",
      q: "♛",
      r: "♜",
      b: "♝",
      n: "♞",
      p: "♟"
    };

    const defaultResult = {
      move: "--",
      note: ""
    };
    const defaultSourceCounts = {
      human: 0,
      engine: 0
    };

    const files = ["a", "b", "c", "d", "e", "f", "g", "h"];
    const ranks = [8, 7, 6, 5, 4, 3, 2, 1];
    const allSquares = [];
    const paletteOrder = ["K", "Q", "R", "B", "N", "P", "k", "q", "r", "b", "n", "p", "."];
    const boardEl = document.getElementById("board");
    const paletteEl = document.getElementById("palette");
    const resultEl = document.getElementById("result");
    const humanCountEl = document.getElementById("humanCount");
    const engineCountEl = document.getElementById("engineCount");
    const fenBoxEl = document.getElementById("fenBox");
    const turnEl = document.getElementById("turn");
    const epEl = document.getElementById("ep");
    const halfmoveEl = document.getElementById("halfmove");
    const fullmoveEl = document.getElementById("fullmove");
    const autoTurnEl = document.getElementById("autoTurn");
    const statusBoxEl = document.getElementById("statusBox");
    const editToolsEl = document.getElementById("editTools");
    const moveModeBtn = document.getElementById("moveModeBtn");
    const editModeBtn = document.getElementById("editModeBtn");
    const flipBtn = document.getElementById("flipBtn");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const historyHintEl = document.getElementById("historyHint");

    const castleKEl = document.getElementById("castleK");
    const castleQEl = document.getElementById("castleQ");
    const castlekEl = document.getElementById("castlek");
    const castleqEl = document.getElementById("castleq");

    const defaultSelection = "P";
    const modeMove = "move";
    const modeEdit = "edit";

    let selectedPiece = defaultSelection;
    let activeMode = modeMove;
    let boardFlipped = false;
    let selectedSquare = null;
    let lastMoveSquares = [];
    let boardState = {};
    let sourceCounts = { ...defaultSourceCounts };
    let historyStack = [];
    let redoStack = [];
    const squareRefs = {};
    const paletteButtons = {};
    const humanSources = new Set(["lichess-masters", "lichess-human", "opening-book"]);
    const openingBookUrl = "./opening-book.json";
    const stockfishAsmWorkerUrl = "https://unpkg.com/stockfish.js@9.0.0/stockfish.js";
    const stockfishWasmWorkerUrl = "https://unpkg.com/stockfish.js@9.0.0/stockfish.wasm.js";
    const engineMoveTimeMs = 7000;
    const engineHashMb = 128;
    const engineSearchDepth = 26;
    const openingBookState = {
      positions: null,
      promise: null
    };
    const openingBookHistory = new Map();
    const engineState = {
      worker: null,
      readyPromise: null,
      pendingSearch: null
    };

    const startPosition = {
      a8: "r", b8: "n", c8: "b", d8: "q", e8: "k", f8: "b", g8: "n", h8: "r",
      a7: "p", b7: "p", c7: "p", d7: "p", e7: "p", f7: "p", g7: "p", h7: "p",
      a2: "P", b2: "P", c2: "P", d2: "P", e2: "P", f2: "P", g2: "P", h2: "P",
      a1: "R", b1: "N", c1: "B", d1: "Q", e1: "K", f1: "B", g1: "N", h1: "R"
    };

    for (const rank of ranks) {
      for (const file of files) {
        allSquares.push(file + rank);
      }
    }

    function isLightSquare(square) {
      return (files.indexOf(square[0]) + Number(square[1])) % 2 === 1;
    }

    function handlePaletteSelection(piece) {
      selectedPiece = piece;
      if (activeMode !== modeEdit) {
        setMode(modeEdit);
        return;
      }

      renderPalette();
      updateStatus();
    }

    function buildPaletteSkeleton() {
      if (paletteEl.childElementCount > 0) {
        return;
      }

      const fragment = document.createDocumentFragment();
      for (const piece of paletteOrder) {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.piece = piece;
        button.className = "piece-btn";

        if (piece !== ".") {
          button.className += piece === piece.toUpperCase() ? " piece-btn-white" : " piece-btn-black";
        }

        button.innerHTML = pieceMarkup(piece);
        button.addEventListener("click", () => handlePaletteSelection(piece));
        paletteButtons[piece] = button;
        fragment.appendChild(button);
      }

      paletteEl.appendChild(fragment);
    }

    function handleBoardSquareClick(event) {
      const square = event.currentTarget.dataset.square;
      const piece = boardState[square];

      if (activeMode === modeEdit) {
        if (selectedPiece === ".") {
          delete boardState[square];
        } else {
          boardState[square] = selectedPiece;
        }
        selectedSquare = null;
        lastMoveSquares = [];
        markPositionDirty();
        refreshUi();
        commitState();
        return;
      }

      if (!selectedSquare) {
        if (piece) {
          selectedSquare = square;
          refreshUi();
        }
        return;
      }

      if (selectedSquare === square) {
        selectedSquare = null;
        refreshUi();
        return;
      }

      const sourcePiece = boardState[selectedSquare];
      if (piece && sourcePiece && pieceColor(piece) === pieceColor(sourcePiece)) {
        selectedSquare = square;
        refreshUi();
        return;
      }

      movePiece(selectedSquare, square);
    }

    function handleBoardSquareContextMenu(event) {
      event.preventDefault();
      const square = event.currentTarget.dataset.square;
      if (!boardState[square]) {
        return;
      }

      delete boardState[square];
      if (selectedSquare === square) {
        selectedSquare = null;
      }
      lastMoveSquares = [];
      markPositionDirty();
      refreshUi();
      commitState();
    }

    function buildBoardSkeleton() {
      if (boardEl.childElementCount > 0) {
        return;
      }

      const fragment = document.createDocumentFragment();
      for (const square of allSquares) {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.square = square;
        button.className = "square " + (isLightSquare(square) ? "light" : "dark");
        button.addEventListener("click", handleBoardSquareClick);
        button.addEventListener("contextmenu", handleBoardSquareContextMenu);

        const pieceHost = document.createElement("span");
        pieceHost.className = "piece-host";

        const coord = document.createElement("span");
        coord.className = "coord";
        coord.textContent = square;

        button.appendChild(pieceHost);
        button.appendChild(coord);

        squareRefs[square] = {
          button,
          pieceHost,
          lastClassName: "",
          lastPiece: ""
        };
        fragment.appendChild(button);
      }

      boardEl.appendChild(fragment);
    }

    function visibleSquares() {
      return boardFlipped ? [...allSquares].reverse() : allSquares;
    }

    function updateBoardOrder() {
      const fragment = document.createDocumentFragment();
      for (const square of visibleSquares()) {
        fragment.appendChild(squareRefs[square].button);
      }
      boardEl.appendChild(fragment);
      flipBtn.classList.toggle("selected", boardFlipped);
    }

    function setResult(move, note) {
      const safeNote = note || "";
      resultEl.innerHTML = safeNote
        ? "<strong>" + move + "</strong><span>" + safeNote + "</span>"
        : "<strong>" + move + "</strong>";
    }

    function currentResultSnapshot() {
      const moveEl = resultEl.querySelector("strong");
      const noteEl = resultEl.querySelector("span");
      return {
        move: moveEl ? moveEl.textContent : defaultResult.move,
        note: noteEl ? noteEl.textContent : defaultResult.note
      };
    }

    function pieceMarkup(piece) {
      if (!piece) {
        return "";
      }
      if (piece === ".") {
        return '<span class="piece-clear" aria-hidden="true">×</span>';
      }
      return '<span class="piece-shell piece-char" aria-hidden="true">' + pieceChars[piece] + "</span>";
    }

    function pieceColor(piece) {
      return piece === piece.toUpperCase() ? "white" : "black";
    }

    function sanitizeSourceCounts(counts) {
      return {
        human: Math.max(0, Number(counts?.human) || 0),
        engine: Math.max(0, Number(counts?.engine) || 0)
      };
    }

    function updateSourceStats() {
      humanCountEl.textContent = String(sourceCounts.human);
      engineCountEl.textContent = String(sourceCounts.engine);
    }

    function resetSourceStats() {
      sourceCounts = { ...defaultSourceCounts };
      updateSourceStats();
    }

    function recordAnalyzeSource(source) {
      const normalizedSource = String(source || "").trim();
      if (!normalizedSource) {
        return;
      }

      if (humanSources.has(normalizedSource)) {
        sourceCounts.human += 1;
      } else {
        sourceCounts.engine += 1;
      }
      updateSourceStats();
    }

    function castleString() {
      let value = "";
      if (castleKEl.checked) value += "K";
      if (castleQEl.checked) value += "Q";
      if (castlekEl.checked) value += "k";
      if (castleqEl.checked) value += "q";
      return value || "-";
    }

    function castleStringFromState(castling) {
      let value = "";
      if (castling?.K) value += "K";
      if (castling?.Q) value += "Q";
      if (castling?.k) value += "k";
      if (castling?.q) value += "q";
      return value || "-";
    }

    function currentCastlingState() {
      return {
        K: castleKEl.checked,
        Q: castleQEl.checked,
        k: castlekEl.checked,
        q: castleqEl.checked
      };
    }

    function setCastlingState(castling) {
      castleKEl.checked = Boolean(castling.K);
      castleQEl.checked = Boolean(castling.Q);
      castlekEl.checked = Boolean(castling.k);
      castleqEl.checked = Boolean(castling.q);
    }

    function setCastlingFromString(castling) {
      setCastlingState({
        K: castling.includes("K"),
        Q: castling.includes("Q"),
        k: castling.includes("k"),
        q: castling.includes("q")
      });
    }

    function buildPlacementFromState(stateBoard = boardState) {
      const rows = [];
      for (const rank of ranks) {
        let row = "";
        let emptyRun = 0;
        for (const file of files) {
          const square = file + rank;
          const piece = stateBoard[square];
          if (!piece) {
            emptyRun += 1;
            continue;
          }
          if (emptyRun) {
            row += String(emptyRun);
            emptyRun = 0;
          }
          row += piece;
        }
        if (emptyRun) {
          row += String(emptyRun);
        }
        rows.push(row);
      }
      return rows.join("/");
    }

    function buildPlacement() {
      return buildPlacementFromState(boardState);
    }

    function buildFen() {
      const ep = (epEl.value || "-").trim() || "-";
      return [
        buildPlacement(),
        turnEl.value,
        castleString(),
        ep,
        Math.max(0, Number(halfmoveEl.value || 0)),
        Math.max(1, Number(fullmoveEl.value || 1))
      ].join(" ");
    }

    function updateFen() {
      if (fenBoxEl) {
        fenBoxEl.textContent = buildFen();
      }
    }

    function createGame(fen) {
      try {
        return new Chess(fen);
      } catch (error) {
        return null;
      }
    }

    function deriveCastleStringFromBoard() {
      let rights = "";

      if (boardState.e1 === "K") {
        if (boardState.h1 === "R") {
          rights += "K";
        }
        if (boardState.a1 === "R") {
          rights += "Q";
        }
      }

      if (boardState.e8 === "k") {
        if (boardState.h8 === "r") {
          rights += "k";
        }
        if (boardState.a8 === "r") {
          rights += "q";
        }
      }

      return rights || "-";
    }

    function sanitizeEpSquare(turn, ep, stateBoard = boardState) {
      const value = String(ep || "-").trim();
      if (!/^[a-h][36]$/.test(value)) {
        return "-";
      }

      const file = value[0];
      const rank = value[1];
      const fileIndex = files.indexOf(file);
      if (fileIndex === -1) {
        return "-";
      }

      if (turn === "w") {
        if (rank !== "6" || stateBoard[file + "5"] !== "p") {
          return "-";
        }
        const left = fileIndex > 0 ? files[fileIndex - 1] + "5" : "";
        const right = fileIndex < files.length - 1 ? files[fileIndex + 1] + "5" : "";
        if (stateBoard[left] !== "P" && stateBoard[right] !== "P") {
          return "-";
        }
        return value;
      }

      if (rank !== "3" || stateBoard[file + "4"] !== "P") {
        return "-";
      }
      const left = fileIndex > 0 ? files[fileIndex - 1] + "4" : "";
      const right = fileIndex < files.length - 1 ? files[fileIndex + 1] + "4" : "";
      if (stateBoard[left] !== "p" && stateBoard[right] !== "p") {
        return "-";
      }
      return value;
    }

    function buildFenKeyFromSnapshot(state) {
      const snapshotBoard = state?.boardState && typeof state.boardState === "object" ? state.boardState : boardState;
      const snapshotTurn = state?.turn === "b" ? "b" : "w";
      const snapshotCastling = castleStringFromState(state?.castling || currentCastlingState());
      const snapshotEp = sanitizeEpSquare(snapshotTurn, state?.ep ?? epEl.value, snapshotBoard);
      return [buildPlacementFromState(snapshotBoard), snapshotTurn, snapshotCastling, snapshotEp].join(" ");
    }

    function buildCurrentFenKey() {
      return buildFenKeyFromSnapshot({
        boardState,
        turn: turnEl.value,
        castling: currentCastlingState(),
        ep: epEl.value
      });
    }

    function currentPositionRepetitionCount() {
      const targetKey = buildCurrentFenKey();
      let count = 0;

      for (const state of historyStack) {
        if (buildFenKeyFromSnapshot(state) === targetKey) {
          count += 1;
        }
      }

      return count;
    }

    function buildAnalyzableGameState() {
      const rawFen = buildFen();
      const rawGame = createGame(rawFen);
      if (rawGame) {
        return {
          fen: rawFen,
          game: rawGame
        };
      }

      const sanitizedFen = [
        buildPlacement(),
        turnEl.value === "b" ? "b" : "w",
        deriveCastleStringFromBoard(),
        sanitizeEpSquare(turnEl.value, epEl.value),
        Math.max(0, Number(halfmoveEl.value || 0)),
        Math.max(1, Number(fullmoveEl.value || 1))
      ].join(" ");
      const sanitizedGame = createGame(sanitizedFen);

      return {
        fen: sanitizedGame ? sanitizedFen : rawFen,
        game: sanitizedGame
      };
    }

    function gameOverResult(game, repetitionCount = 1) {
      if (!game) {
        return null;
      }
      if (typeof game.isCheckmate === "function" && game.isCheckmate()) {
        return { move: "mate", note: "" };
      }
      if (repetitionCount >= 3) {
        return { move: "draw", note: "" };
      }
      if (Math.max(0, Number(halfmoveEl.value || 0)) >= 100) {
        return { move: "draw", note: "" };
      }
      if (typeof game.isStalemate === "function" && game.isStalemate()) {
        return { move: "draw", note: "" };
      }
      if (typeof game.isDraw === "function" && game.isDraw()) {
        return { move: "draw", note: "" };
      }
      if (typeof game.isGameOver === "function" && game.isGameOver()) {
        return { move: "game over", note: "" };
      }
      return null;
    }

    function normalizeFenKey(fen) {
      return String(fen || "")
        .trim()
        .split(/\s+/)
        .slice(0, 4)
        .join(" ");
    }

    function randomChoice(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function normalizeUciMoveForGame(game, uci) {
      const value = String(uci || "").trim().toLowerCase();
      if (!/^[a-h][1-8][a-h][1-8][nbrq]?$/i.test(value)) {
        return "";
      }

      const move = {
        from: value.slice(0, 2),
        to: value.slice(2, 4),
        promotion: value[4] || undefined
      };

      const piece = game.get(move.from);
      if (!piece || piece.type !== "k") {
        return value;
      }

      if (move.from === "e1" && move.to === "h1") {
        return "e1g1";
      }
      if (move.from === "e1" && move.to === "a1") {
        return "e1c1";
      }
      if (move.from === "e8" && move.to === "h8") {
        return "e8g8";
      }
      if (move.from === "e8" && move.to === "a8") {
        return "e8c8";
      }

      return value;
    }

    async function fetchJsonWithTimeout(url, options = {}, timeoutMs = 2500) {
      const controller = new AbortController();
      const timer = window.setTimeout(() => controller.abort(), timeoutMs);

      try {
        const response = await fetch(url, {
          ...options,
          signal: controller.signal
        });
        const payload = await response.json().catch(() => null);
        return { response, payload };
      } finally {
        window.clearTimeout(timer);
      }
    }

    async function loadOpeningBook() {
      if (openingBookState.positions) {
        return openingBookState.positions;
      }

      if (!openingBookState.promise) {
        openingBookState.promise = fetch(openingBookUrl, { cache: "no-store" })
          .then((response) => {
            if (!response.ok) {
              throw new Error("opening book failed to load");
            }
            return response.json();
          })
          .then((payload) => {
            const positions =
              payload && typeof payload === "object" && payload.positions && typeof payload.positions === "object"
                ? payload.positions
                : {};
            openingBookState.positions = positions;
            return positions;
          })
          .catch((error) => {
            openingBookState.promise = null;
            throw error;
          });
      }

      return openingBookState.promise;
    }

    async function requestOpeningBookMove(fen) {
      let positions = null;

      try {
        positions = await loadOpeningBook();
      } catch (error) {
        return null;
      }

      const position = positions[normalizeFenKey(fen)];
      const moves = Array.isArray(position?.moves)
        ? position.moves.filter((move) => typeof move === "string" && /^[a-h][1-8][a-h][1-8][nbrq]?$/i.test(move))
        : [];

      if (moves.length === 0) {
        return null;
      }

      const lastMove = openingBookHistory.get(normalizeFenKey(fen));
      const candidates = moves.length > 1 ? moves.filter((move) => move !== lastMove) : moves;
      const uci = randomChoice(candidates.length > 0 ? candidates : moves);
      openingBookHistory.set(normalizeFenKey(fen), uci);

      return {
        source: String(position?.source || "opening-book"),
        uci
      };
    }

    function numericScore(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    async function requestCloudEvalMove(fen) {
      try {
        const { response, payload } = await fetchJsonWithTimeout(
          "https://lichess.org/api/cloud-eval?fen=" + encodeURIComponent(fen) + "&multiPv=4",
          {
            headers: { Accept: "application/json" },
            cache: "no-store"
          },
          3000
        );
        if (!response.ok) {
          return null;
        }
        const pvs = Array.isArray(payload?.pvs) ? payload.pvs : [];
        const candidates = [];

        for (const pv of pvs) {
          const moves = typeof pv?.moves === "string" ? pv.moves.trim().split(/\s+/) : [];
          const uci = moves[0];
          if (!uci || !/^[a-h][1-8][a-h][1-8][nbrq]?$/i.test(uci)) {
            continue;
          }
          candidates.push({
            uci,
            scoreCp: numericScore(pv?.cp),
            mate: numericScore(pv?.mate)
          });
        }

        if (candidates.length === 0) {
          return null;
        }
        return {
          source: "lichess-cloud-eval",
          candidates
        };
      } catch (error) {
        return null;
      }
    }

    function wasmSupported() {
      const source = Uint8Array.of(0x0, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00);
      return (
        typeof WebAssembly === "object" &&
        typeof WebAssembly.validate === "function" &&
        WebAssembly.validate(source)
      );
    }

    function resetEngineWorker() {
      if (engineState.pendingSearch) {
        engineState.pendingSearch.reject(new Error("engine restarted"));
        clearTimeout(engineState.pendingSearch.timer);
        engineState.pendingSearch = null;
      }

      if (engineState.worker) {
        engineState.worker.terminate();
      }

      engineState.worker = null;
      engineState.readyPromise = null;
    }

    function createEngineWorker() {
      return new Worker(wasmSupported() ? stockfishWasmWorkerUrl : stockfishAsmWorkerUrl);
    }

    function ensureEngineWorker() {
      if (engineState.readyPromise) {
        return engineState.readyPromise;
      }

      engineState.readyPromise = new Promise((resolve, reject) => {
        const worker = createEngineWorker();
        let phase = "uci";
        const startupTimer = window.setTimeout(() => {
          cleanup();
          resetEngineWorker();
          reject(new Error("engine startup timeout"));
        }, 20000);

        function cleanup() {
          window.clearTimeout(startupTimer);
          worker.removeEventListener("message", onMessage);
          worker.removeEventListener("error", onError);
        }

        function onError() {
          cleanup();
          resetEngineWorker();
          reject(new Error("engine load failed"));
        }

        function onMessage(event) {
          const line = String(event.data || "").trim();
          if (!line) {
            return;
          }

          if (phase === "uci" && line === "uciok") {
            phase = "ready";
            worker.postMessage("setoption name Hash value " + engineHashMb);
            worker.postMessage("setoption name MultiPV value 4");
            worker.postMessage("setoption name Skill Level value 20");
            worker.postMessage("isready");
            return;
          }

          if (phase === "ready" && line === "readyok") {
            cleanup();
            engineState.worker = worker;
            resolve(worker);
            return;
          }
        }

        worker.addEventListener("message", onMessage);
        worker.addEventListener("error", onError);
        worker.postMessage("uci");
      });

      return engineState.readyPromise;
    }

    async function requestEngineMove(fen) {
      const worker = await ensureEngineWorker();

      return new Promise((resolve, reject) => {
        const candidateMap = new Map();

        if (engineState.pendingSearch) {
          engineState.pendingSearch.reject(new Error("engine busy"));
          clearTimeout(engineState.pendingSearch.timer);
          engineState.pendingSearch = null;
        }

        function cleanup() {
          worker.removeEventListener("message", onMessage);
          worker.removeEventListener("error", onError);
          if (engineState.pendingSearch?.cleanup === cleanup) {
            clearTimeout(engineState.pendingSearch.timer);
            engineState.pendingSearch = null;
          }
        }

        function fail(message) {
          cleanup();
          resetEngineWorker();
          reject(new Error(message));
        }

        function onError() {
          fail("engine crashed");
        }

        function onMessage(event) {
          const line = String(event.data || "").trim();
          if (!line) {
            return;
          }

          if (line.startsWith("info ")) {
            const pvMatch = line.match(/\bpv\s+([a-h][1-8][a-h][1-8][nbrq]?)/i);
            if (!pvMatch) {
              return;
            }

            const multipvMatch = line.match(/\bmultipv\s+(\d+)/i);
            const cpMatch = line.match(/\bscore\s+cp\s+(-?\d+)/i);
            const mateMatch = line.match(/\bscore\s+mate\s+(-?\d+)/i);
            const index = multipvMatch ? Math.max(1, Number(multipvMatch[1])) : 1;
            candidateMap.set(index, {
              uci: pvMatch[1].toLowerCase(),
              scoreCp: cpMatch ? Number(cpMatch[1]) : null,
              mate: mateMatch ? Number(mateMatch[1]) : null
            });
            return;
          }

          if (!line.startsWith("bestmove ")) {
            return;
          }

          const parts = line.split(/\s+/);
          const bestmove = parts[1];
          if (!bestmove || bestmove === "(none)") {
            fail("engine returned no move");
            return;
          }

          cleanup();
          const candidates = [...candidateMap.entries()]
            .sort((left, right) => left[0] - right[0])
            .map((entry) => entry[1]);
          if (!candidates.some((candidate) => candidate.uci === bestmove)) {
            candidates.unshift({ uci: bestmove.toLowerCase(), scoreCp: null, mate: null });
          }
          resolve({
            source: "stockfish-web",
            uci: bestmove,
            candidates
          });
        }

        const timer = window.setTimeout(() => {
          fail("engine timed out");
        }, 15000);

        engineState.pendingSearch = {
          timer,
          cleanup,
          reject
        };

        worker.addEventListener("message", onMessage);
        worker.addEventListener("error", onError);
        worker.postMessage("position fen " + fen);
        worker.postMessage("go depth " + engineSearchDepth + " movetime " + engineMoveTimeMs);
      });
    }

    async function requestRemoteMove(fen) {
      const results = await Promise.allSettled([
        requestCloudEvalMove(fen),
        requestChessApiMove(fen),
        requestChessDbMove(fen)
      ]);

      const moves = [];
      for (const result of results) {
        if (result.status === "fulfilled" && result.value) {
          moves.push(result.value);
        }
      }

      return moves;
    }

    function requestHeuristicMove(game) {
      const moves = typeof game?.moves === "function" ? game.moves({ verbose: true }) : [];
      if (!Array.isArray(moves) || moves.length === 0) {
        return null;
      }

      const captureValues = {
        p: 100,
        n: 320,
        b: 330,
        r: 500,
        q: 900,
        k: 0
      };
      const centerSquares = new Set(["d4", "e4", "d5", "e5", "c3", "f3", "c6", "f6"]);
      let bestMove = null;
      let bestScore = -Infinity;

      for (const move of moves) {
        const next = new Chess(game.fen());
        const applied = next.move({
          from: move.from,
          to: move.to,
          promotion: move.promotion || undefined
        });
        if (!applied) {
          continue;
        }

        let score = 0;
        if (move.captured) {
          score += captureValues[move.captured] || 0;
        }
        if (move.promotion) {
          score += 800;
        }
        if (next.isCheckmate()) {
          score += 100000;
        } else if (next.inCheck()) {
          score += 140;
        }
        if (centerSquares.has(move.to)) {
          score += 25;
        }
        if (move.flags && move.flags.includes("k")) {
          score += 60;
        }
        if (move.flags && move.flags.includes("q")) {
          score += 55;
        }

        if (score > bestScore) {
          bestScore = score;
          bestMove = move;
        }
      }

      if (!bestMove) {
        return null;
      }

      return {
        source: "legal-fallback",
        uci: bestMove.from + bestMove.to + (bestMove.promotion || "")
      };
    }

    function materialBalanceCp(game) {
      const values = {
        p: 100,
        n: 320,
        b: 330,
        r: 500,
        q: 900,
        k: 0
      };
      let score = 0;

      for (const rank of ranks) {
        for (const file of files) {
          const piece = game.get(file + rank);
          if (!piece) {
            continue;
          }
          const value = values[piece.type] || 0;
          score += piece.color === "w" ? value : -value;
        }
      }

      return score;
    }

    function previewLegalMove(game, analysis) {
      const uci = normalizeUciMoveForGame(game, analysis?.uci);
      if (!/^[a-h][1-8][a-h][1-8][nbrq]?$/i.test(uci)) {
        return null;
      }

      const preview = new Chess(game.fen());
      const move = preview.move({
        from: uci.slice(0, 2),
        to: uci.slice(2, 4),
        promotion: uci[4] || undefined
      });

      if (!move) {
        return null;
      }

      return {
        source: String(analysis?.source || ""),
        uci,
        san: move.san,
        fen: preview.fen(),
        scoreCp: numericScore(analysis?.scoreCp),
        mate: numericScore(analysis?.mate),
        isCapture: Boolean(move.captured),
        isPromotion: Boolean(move.promotion),
        isCheck: preview.inCheck(),
        isCheckmate: preview.isCheckmate(),
        isDraw: preview.isDraw(),
        materialCp: materialBalanceCp(preview)
      };
    }

    function countFenKeyInHistory(targetKey) {
      let count = 0;
      for (const state of historyStack) {
        if (buildFenKeyFromSnapshot(state) === targetKey) {
          count += 1;
        }
      }
      return count;
    }

    function recentHistoryKeys(limit = 8) {
      return historyStack
        .slice(Math.max(0, historyStack.length - limit))
        .map((state) => buildFenKeyFromSnapshot(state));
    }

    function orientedScore(game, value) {
      const number = numericScore(value);
      if (number === null) {
        return null;
      }
      return typeof game.turn === "function" && game.turn() === "b" ? -number : number;
    }

    function sourcePriority(source) {
      switch (String(source || "")) {
        case "opening-book":
        case "lichess-masters":
          return 9000;
        case "lichess-human":
          return 8500;
        case "lichess-cloud-eval":
          return 6200;
        case "stockfish-web":
          return 6000;
        case "chess-api":
          return 5600;
        case "chessdb":
          return 5200;
        default:
          return 0;
      }
    }

    function resolvedMoveSelectionScore(game, resolved) {
      let score = sourcePriority(resolved.source);
      const orientedCp = orientedScore(game, resolved.scoreCp);
      const orientedMate = orientedScore(game, resolved.mate);
      const nextKey = normalizeFenKey(resolved.fen);
      const priorOccurrences = countFenKeyInHistory(nextKey);
      const recentKeys = recentHistoryKeys(8);

      if (resolved.isCheckmate) {
        score += 1_000_000;
      }

      if (typeof orientedMate === "number") {
        if (orientedMate > 0) {
          score += 600_000 - Math.min(Math.abs(orientedMate), 50) * 5_000;
        } else if (orientedMate < 0) {
          score -= 600_000 - Math.min(Math.abs(orientedMate), 50) * 5_000;
        }
      }

      if (typeof orientedCp === "number") {
        score += Math.max(-1600, Math.min(1600, orientedCp));
      }

      if (resolved.isCapture) {
        score += 40;
      }
      if (resolved.isCheck) {
        score += 28;
      }
      if (resolved.isPromotion) {
        score += 80;
      }
      if (resolved.isDraw) {
        score -= 220_000;
      }
      if (priorOccurrences >= 2) {
        score -= 250_000;
      } else if (priorOccurrences === 1) {
        score -= 3_500;
      }
      if (recentKeys.length >= 2 && recentKeys[recentKeys.length - 2] === nextKey) {
        score -= 18_000;
      }
      if (recentKeys.length >= 4 && recentKeys[recentKeys.length - 4] === nextKey) {
        score -= 14_000;
      }
      if (recentKeys.length >= 6 && recentKeys[recentKeys.length - 6] === nextKey) {
        score -= 10_000;
      }

      return score;
    }

    function pickBestResolvedMove(game, analyses) {
      const candidates = [];

      for (const analysis of analyses) {
        if (!analysis) {
          continue;
        }

        const source = String(analysis?.source || "");
        const sourceCandidates = Array.isArray(analysis?.candidates) && analysis.candidates.length > 0
          ? analysis.candidates
          : [analysis];

        for (const candidate of sourceCandidates) {
          const resolved = previewLegalMove(game, {
            source,
            ...candidate
          });
          if (!resolved) {
            continue;
          }
          resolved.selectionScore = resolvedMoveSelectionScore(game, resolved);
          candidates.push(resolved);
        }
      }

      if (candidates.length === 0) {
        return null;
      }

      candidates.sort((left, right) => right.selectionScore - left.selectionScore);
      return candidates[0];
    }

    async function resolveAnalysis(game, fen) {
      try {
        const openingAnalysis = await requestOpeningBookMove(fen);
        const openingResolved = pickBestResolvedMove(game, [openingAnalysis]);
        if (openingResolved) {
          return openingResolved;
        }
      } catch (error) {
      }

      let fallbackResolved = null;

      try {
        const [remoteResult, engineResult] = await Promise.allSettled([
          requestRemoteMove(fen),
          requestEngineMove(fen)
        ]);
        const analyses = [];

        if (remoteResult.status === "fulfilled" && Array.isArray(remoteResult.value)) {
          analyses.push(...remoteResult.value);
        }
        if (engineResult.status === "fulfilled" && engineResult.value) {
          analyses.push(engineResult.value);
        }

        const resolved = pickBestResolvedMove(game, analyses);
        if (resolved) {
          if (resolved.selectionScore > -120_000) {
            return resolved;
          }
          fallbackResolved = resolved;
        }
      } catch (error) {
      }

      if (fallbackResolved) {
        return fallbackResolved;
      }

      try {
        resetEngineWorker();
        const engineAnalysis = await requestEngineMove(fen);
        const resolved = pickBestResolvedMove(game, [engineAnalysis]);
        if (resolved) {
          return resolved;
        }
      } catch (error) {
      }

      throw new Error("analysis unavailable");
    }

    function applyFenPosition(fen, moveUci = "") {
      const parts = String(fen || "").trim().split(/\s+/);
      if (parts.length < 6) {
        throw new Error("Invalid FEN returned by engine");
      }

      const [placement, turn, castling, ep, halfmove, fullmove] = parts;
      const rows = placement.split("/");
      if (rows.length !== 8) {
        throw new Error("Invalid placement returned by engine");
      }

      const nextBoardState = {};
      for (let rowIndex = 0; rowIndex < rows.length; rowIndex += 1) {
        const row = rows[rowIndex];
        let fileIndex = 0;

        for (const symbol of row) {
          if (/\d/.test(symbol)) {
            fileIndex += Number(symbol);
            continue;
          }

          if (!files[fileIndex]) {
            throw new Error("Invalid square data returned by engine");
          }

          nextBoardState[files[fileIndex] + ranks[rowIndex]] = symbol;
          fileIndex += 1;
        }

        if (fileIndex !== 8) {
          throw new Error("Invalid rank data returned by engine");
        }
      }

      boardState = nextBoardState;
      turnEl.value = turn === "b" ? "b" : "w";
      setCastlingFromString(castling === "-" ? "" : castling);
      epEl.value = ep || "-";
      halfmoveEl.value = String(Math.max(0, Number(halfmove) || 0));
      fullmoveEl.value = String(Math.max(1, Number(fullmove) || 1));
      selectedSquare = null;
      lastMoveSquares = moveUci ? [moveUci.slice(0, 2), moveUci.slice(2, 4)] : [];
      refreshUi();
    }

    function applyResolvedAnalysis(analysis) {
      applyFenPosition(analysis.fen, analysis.uci);
      recordAnalyzeSource(analysis.source);
      setResult(analysis.san, "");
      commitState();
    }

    function toggleTurn() {
      turnEl.value = turnEl.value === "w" ? "b" : "w";
    }

    function updateHistoryButtons() {
      undoBtn.disabled = historyStack.length <= 1;
      redoBtn.disabled = redoStack.length === 0;
      if (historyHintEl) {
        historyHintEl.textContent = "";
      }
    }

    function updateStatus() {
      if (!statusBoxEl) {
        return;
      }

      if (activeMode === modeMove) {
        if (selectedSquare) {
          statusBoxEl.textContent =
            "Selected " + selectedSquare + ". Click the target square to move there.";
          return;
        }
        statusBoxEl.textContent =
          "Move mode: click a piece, then click its destination. Use Undo if you want to roll back.";
        return;
      }

      const editLabel = selectedPiece === "." ? "eraser" : "piece " + selectedPiece;
      statusBoxEl.textContent =
        "Edit mode: " + editLabel + " selected. Click any square to paint it, and use the arrows to step back.";
    }

    function updateModeChrome() {
      moveModeBtn.classList.toggle("selected", activeMode === modeMove);
      editModeBtn.classList.toggle("selected", activeMode === modeEdit);
      editToolsEl.open = activeMode === modeEdit;
    }

    function refreshUi() {
      updateModeChrome();
      renderPalette();
      renderBoard();
      updateBoardOrder();
      updateFen();
      updateSourceStats();
      updateStatus();
      updateHistoryButtons();
    }

    function markPositionDirty() {
      setResult(defaultResult.move, defaultResult.note);
    }

    function captureState() {
      return {
        boardState: { ...boardState },
        turn: turnEl.value,
        ep: epEl.value,
        halfmove: halfmoveEl.value,
        fullmove: fullmoveEl.value,
        castling: currentCastlingState(),
        autoTurn: autoTurnEl.checked,
        activeMode,
        boardFlipped,
        selectedPiece,
        lastMoveSquares: [...lastMoveSquares],
        sourceCounts: sanitizeSourceCounts(sourceCounts),
        result: currentResultSnapshot()
      };
    }

    function stateFingerprint(state) {
      return JSON.stringify(state);
    }

    function restoreState(state) {
      boardState = { ...(state.boardState || {}) };
      turnEl.value = state.turn || "w";
      epEl.value = state.ep ?? "-";
      halfmoveEl.value = state.halfmove ?? "0";
      fullmoveEl.value = state.fullmove ?? "1";
      setCastlingState(state.castling || {});
      autoTurnEl.checked = state.autoTurn !== false;
      activeMode = state.activeMode || modeMove;
      boardFlipped = Boolean(state.boardFlipped);
      selectedPiece = state.selectedPiece || defaultSelection;
      selectedSquare = null;
      lastMoveSquares = [...(state.lastMoveSquares || [])];
      sourceCounts = sanitizeSourceCounts(state.sourceCounts);
      refreshUi();
      if (state.result) {
        setResult(state.result.move, state.result.note);
      } else {
        setResult(defaultResult.move, defaultResult.note);
      }
    }

    function commitState() {
      const snapshot = captureState();
      const fingerprint = stateFingerprint(snapshot);
      const previous =
        historyStack.length > 0
          ? stateFingerprint(historyStack[historyStack.length - 1])
          : null;

      if (fingerprint !== previous) {
        historyStack.push(snapshot);
        redoStack = [];
      }
      updateHistoryButtons();
    }

    function undoHistory() {
      if (historyStack.length <= 1) {
        return;
      }

      const current = historyStack.pop();
      redoStack.push(current);
      restoreState(historyStack[historyStack.length - 1]);
      updateHistoryButtons();
    }

    function redoHistory() {
      if (redoStack.length === 0) {
        return;
      }

      const next = redoStack.pop();
      historyStack.push(next);
      restoreState(next);
      updateHistoryButtons();
    }

    function setMode(mode) {
      activeMode = mode;
      selectedSquare = null;
      refreshUi();
    }

    function toggleBoardFlip() {
      boardFlipped = !boardFlipped;
      refreshUi();
      commitState();
    }

    function applyStartPosition(record = true) {
      boardState = { ...startPosition };
      selectedSquare = null;
      lastMoveSquares = [];
      activeMode = modeMove;
      turnEl.value = "w";
      epEl.value = "-";
      halfmoveEl.value = "0";
      fullmoveEl.value = "1";
      autoTurnEl.checked = true;
      setCastlingState({ K: true, Q: true, k: true, q: true });
      markPositionDirty();
      refreshUi();
      if (record) {
        commitState();
      }
    }

    function initialFenFromLocation() {
      try {
        const fen = new URLSearchParams(window.location.search).get("fen");
        return fen ? fen.trim() : "";
      } catch (error) {
        return "";
      }
    }

    function applyInitialPosition() {
      const fen = initialFenFromLocation();
      if (!fen) {
        applyStartPosition(false);
        return;
      }

      try {
        applyFenPosition(fen);
        selectedSquare = null;
        lastMoveSquares = [];
        activeMode = modeMove;
        markPositionDirty();
        refreshUi();
      } catch (error) {
        applyStartPosition(false);
      }
    }

    function clearBoard(record = true) {
      boardState = {};
      selectedSquare = null;
      lastMoveSquares = [];
      resetSourceStats();
      turnEl.value = "w";
      epEl.value = "-";
      halfmoveEl.value = "0";
      fullmoveEl.value = "1";
      setCastlingState({ K: false, Q: false, k: false, q: false });
      markPositionDirty();
      refreshUi();
      if (record) {
        commitState();
      }
    }

    function handlePositionMetaChange() {
      selectedSquare = null;
      lastMoveSquares = [];
      markPositionDirty();
      refreshUi();
      commitState();
    }

    function movePiece(fromSquare, toSquare) {
      const movingPiece = boardState[fromSquare];
      if (!movingPiece || fromSquare === toSquare) {
        return;
      }

      boardState[toSquare] = movingPiece;
      delete boardState[fromSquare];
      selectedSquare = null;
      lastMoveSquares = [fromSquare, toSquare];

      if (autoTurnEl.checked) {
        toggleTurn();
      }

      markPositionDirty();
      refreshUi();
      commitState();
    }

    function renderPalette() {
      for (const piece of paletteOrder) {
        paletteButtons[piece].classList.toggle("selected", piece === selectedPiece);
      }
    }

    function renderBoard() {
      const highlightedSquares = new Set(lastMoveSquares);

      for (const square of allSquares) {
        const piece = boardState[square];
        const ref = squareRefs[square];
        let className = "square " + (isLightSquare(square) ? "light" : "dark");

        if (selectedSquare === square) {
          className += " selected-square";
        }
        if (highlightedSquares.has(square)) {
          className += " last-move";
        }
        if (piece) {
          className += piece === piece.toUpperCase() ? " white-piece" : " black-piece";
        }

        if (ref.lastClassName !== className) {
          ref.button.className = className;
          ref.lastClassName = className;
        }

        const normalizedPiece = piece || "";
        if (ref.lastPiece !== normalizedPiece) {
          ref.pieceHost.innerHTML = pieceMarkup(piece);
          ref.lastPiece = normalizedPiece;
        }
      }
    }

    async function analyze() {
      if (analyzeBtn.disabled) {
        return;
      }

      const state = buildAnalyzableGameState();
      const fen = state.fen;
      const game = state.game;
      updateFen();
      analyzeBtn.disabled = true;
      setResult("...", "");

      try {
        if (!game) {
          setResult("fix board", "");
          return;
        }

        const terminalState = gameOverResult(game, currentPositionRepetitionCount());
        if (terminalState) {
          setResult(terminalState.move, terminalState.note);
          return;
        }

        const bestMove = await resolveAnalysis(game, fen);
        applyResolvedAnalysis(bestMove);
      } catch (error) {
        const message = String(error?.message || "").toLowerCase();
        if (message.includes("fen") || message.includes("board")) {
          setResult("fix board", "");
        } else {
          setResult("unavailable", "");
        }
      } finally {
        analyzeBtn.disabled = false;
      }
    }

    document.getElementById("startBtn").addEventListener("click", () => applyStartPosition(true));
    document.getElementById("clearBtn").addEventListener("click", () => clearBoard(true));
    flipBtn.addEventListener("click", toggleBoardFlip);
    analyzeBtn.addEventListener("click", analyze);
    moveModeBtn.addEventListener("click", () => setMode(modeMove));
    editModeBtn.addEventListener("click", () => setMode(modeEdit));
    undoBtn.addEventListener("click", undoHistory);
    redoBtn.addEventListener("click", redoHistory);

    turnEl.addEventListener("change", handlePositionMetaChange);
    autoTurnEl.addEventListener("change", handlePositionMetaChange);
    epEl.addEventListener("input", updateFen);
    epEl.addEventListener("change", handlePositionMetaChange);
    halfmoveEl.addEventListener("input", updateFen);
    halfmoveEl.addEventListener("change", handlePositionMetaChange);
    fullmoveEl.addEventListener("input", updateFen);
    fullmoveEl.addEventListener("change", handlePositionMetaChange);
    castleKEl.addEventListener("change", handlePositionMetaChange);
    castleQEl.addEventListener("change", handlePositionMetaChange);
    castlekEl.addEventListener("change", handlePositionMetaChange);
    castleqEl.addEventListener("change", handlePositionMetaChange);

    document.addEventListener("keydown", (event) => {
      const modifier = event.metaKey || event.ctrlKey;
      if (!modifier) {
        return;
      }

      const key = event.key.toLowerCase();
      if (key === "z") {
        event.preventDefault();
        if (event.shiftKey) {
          redoHistory();
        } else {
          undoHistory();
        }
        return;
      }

      if (key === "y") {
        event.preventDefault();
        redoHistory();
      }
    });

    buildPaletteSkeleton();
    buildBoardSkeleton();
    setResult(defaultResult.move, defaultResult.note);
    applyInitialPosition();
    setMode(modeMove);
    historyStack = [captureState()];
    redoStack = [];
    updateHistoryButtons();
  </script>
</body>
</html>
